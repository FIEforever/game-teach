<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>条形统计 - 复式条形统计图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC',sans-serif;background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.gc{width:100%;max-width:480px;padding:16px}
.screen{display:none;text-align:center}
.screen.active{display:block}
.start-screen{color:#fff}
.start-screen h1{font-size:28px;text-shadow:2px 2px 4px rgba(0,0,0,0.2);margin-bottom:8px}
.start-screen p{font-size:15px;opacity:0.9;margin-bottom:20px}
.chart-preview{font-size:48px;margin:16px 0;animation:chartGrow 2s ease-in-out infinite}
@keyframes chartGrow{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.1)}}
.btn{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.2);transition:transform .2s}
.btn:hover{transform:scale(1.05)}
.gh{display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:10px}
.gh span{background:rgba(255,255,255,0.3);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.pb{height:8px;background:rgba(255,255,255,0.3);border-radius:4px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:#fff;border-radius:4px;transition:width .5s}
.ga{background:#fff;border-radius:24px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.1);min-height:420px}
.qb{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:16px;padding:14px;margin-bottom:14px;font-size:15px;font-weight:700;color:#2E7D32;line-height:1.6}
.chart-container{position:relative;width:100%;height:220px;background:#FAFAFA;border-radius:16px;margin:12px 0;border:2px solid #E0E0E0;overflow:hidden;padding:10px}
.chart-title{font-size:13px;font-weight:700;color:#333;margin-bottom:8px;text-align:center}
.chart-area{position:relative;height:170px;border-left:2px solid #333;border-bottom:2px solid #333;margin-left:30px}
.chart-y{position:absolute;left:-30px;font-size:10px;color:#666;transform:translateY(50%)}
.bar-group{position:absolute;bottom:0;display:flex;gap:3px;align-items:flex-end;transition:all .5s}
.bar{width:20px;border-radius:4px 4px 0 0;transition:height 1s ease-out;min-height:2px}
.bar.a{background:linear-gradient(180deg,#3498db,#2980b9)}
.bar.b{background:linear-gradient(180deg,#e74c3c,#c0392b)}
.chart-x-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:#666;white-space:nowrap}
.legend{display:flex;gap:16px;justify-content:center;margin:8px 0}
.legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#666}
.legend-color{width:12px;height:12px;border-radius:3px}
.data-cards{display:flex;gap:8px;justify-content:center;margin:8px 0;flex-wrap:wrap}
.data-card{padding:6px 12px;background:#F5F5F5;border-radius:8px;font-size:12px;color:#666}
.data-card .val{font-weight:700;color:#333}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.opt{padding:12px;border:3px solid #E0E0E0;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;background:#fff}
.opt:hover{border-color:#2E7D32;transform:scale(1.03)}
.opt.correct{border-color:#4CAF50;background:#E8F5E9;animation:pulse .5s}
.opt.wrong{border-color:#f44336;background:#FFEBEE;animation:shake .5s}
.opt.disabled{pointer-events:none;opacity:0.5}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fb{text-align:center;padding:10px;border-radius:12px;margin-top:10px;font-size:14px;font-weight:600;display:none}
.fb.show{display:block;animation:fadeIn .3s}
.fb.ok{background:#E8F5E9;color:#2E7D32}
.fb.no{background:#FFEBEE;color:#C62828}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.end-screen{color:#fff}
.end-screen h1{font-size:28px;margin-bottom:16px}
.fs{font-size:64px;font-weight:800;margin:16px 0}
.sd{font-size:48px;margin:16px 0}
.star{display:inline-block;color:#555;transition:all .5s}
.star.filled{color:#FFD700;animation:starPop .5s}
@keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sn{font-size:14px;opacity:0.7;margin-top:8px}
</style>
</head>
<body>
<div class="gc">
  <div class="screen start-screen active" id="ss">
    <h1>📊 条形统计</h1>
    <p>复式条形统计图 · 四年级</p>
    <div class="chart-preview">📊📈📉</div>
    <p style="font-size:13px;opacity:0.8;margin-bottom:20px">看统计图回答问题<br>学会读复式条形统计图！共10关</p>
    <button class="btn" onclick="startGame()">开始统计 →</button>
  </div>
  <div class="screen" id="gs">
    <div class="gh">
      <span>第 <span id="rn">1</span>/10 关</span>
      <span>⭐ <span id="sv">0</span>分</span>
    </div>
    <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
    <div class="ga">
      <div class="qb" id="qb">看统计图回答问题</div>
      <div class="chart-container">
        <div class="chart-title" id="ct"></div>
        <div class="chart-area" id="ca"></div>
        <div class="legend" id="lg"></div>
      </div>
      <div class="data-cards" id="dc"></div>
      <div class="options" id="opts"></div>
      <div class="fb" id="fb"></div>
    </div>
  </div>
  <div class="screen end-screen" id="es">
    <h1 id="et">🎉 统计完成！</h1>
    <div class="fs" id="fsc">0</div>
    <div class="sd" id="sd"></div>
    <p id="em" style="font-size:16px;margin-bottom:20px;opacity:0.9"></p>
    <p class="sn" id="snn"></p>
    <button class="btn" onclick="startGame()">再来一次 →</button>
  </div>
</div>
<script>
const P=new URLSearchParams(location.search);
const SN=P.get('student')||'';
const T=10;
let rd=0,sc=0,qs=[],ans=false;

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function genQ(){
  const r=[];
  const surveys=[
    {title:'四(1)班和四(2)班最喜欢的水果',labels:['苹果','香蕉','橘子','葡萄'],catA:'四(1)班',catB:'四(2)班'},
    {title:'男生女生最喜欢的运动',labels:['篮球','足球','乒乓球','跑步'],catA:'男生',catB:'女生'},
    {title:'一二三月销售额(万元)',labels:['一月','二月','三月'],catA:'A店',catB:'B店'},
    {title:'两个小组的考试成绩',labels:['语文','数学','英语'],catA:'第一组',catB:'第二组'},
    {title:'两个城市的月气温(°C)',labels:['1月','4月','7月','10月'],catA:'北京',catB:'上海'},
  ];
  for(let i=0;i<T;i++){
    const s=surveys[i%surveys.length];
    const dataA=s.labels.map(()=>rand(5,30));
    const dataB=s.labels.map(()=>rand(5,30));
    const type=rand(0,2);
    let question,correct,wrongs;
    if(type===0){
      const idx=rand(0,s.labels.length-1);
      question=`${s.catA}中，${s.labels[idx]}有多少人？`;
      correct=String(dataA[idx]);
      wrongs=[String(dataB[idx]),String(dataA[(idx+1)%s.labels.length]),String(rand(1,30))].filter(w=>w!==correct).slice(0,3);
    }else if(type===1){
      const idx=rand(0,s.labels.length-1);
      question=`${s.labels[idx]}中，${s.catA}比${s.catB}多多少人？`;
      correct=String(dataA[idx]-dataB[idx]);
      wrongs=[String(dataB[idx]-dataA[idx]),String(dataA[idx]+dataB[idx]),String(rand(1,15))].filter(w=>w!==correct).slice(0,3);
    }else{
      const idx=rand(0,s.labels.length-1);
      question=`${s.labels[idx]}中，${s.catA}和${s.catB}一共有多少人？`;
      correct=String(dataA[idx]+dataB[idx]);
      wrongs=[String(Math.abs(dataA[idx]-dataB[idx])),String(dataA[idx]*2),String(rand(1,40))].filter(w=>w!==correct).slice(0,3);
    }
    r.push({survey:s,dataA,dataB,question,correct,options:[correct,...wrongs].sort(()=>Math.random()-0.5)});
  }
  return r;
}

function startGame(){
  rd=0;sc=0;qs=genQ();
  show('ss',false);show('es',false);show('gs',true);
  next();
}

function show(id,v){document.getElementById(id).classList.toggle('active',v)}

function next(){
  if(rd>=T){end();return}
  ans=false;
  const q=qs[rd];
  document.getElementById('fb').className='fb';
  document.getElementById('rn').textContent=rd+1;
  document.getElementById('pb').style.width=(rd/T*100)+'%';
  document.getElementById('qb').textContent=q.question;
  document.getElementById('ct').textContent=q.survey.title;
  // Legend
  document.getElementById('lg').innerHTML=`
    <div class="legend-item"><div class="legend-color" style="background:#3498db"></div>${q.survey.catA}</div>
    <div class="legend-item"><div class="legend-color" style="background:#e74c3c"></div>${q.survey.catB}</div>
  `;
  // Chart
  const ca=document.getElementById('ca');
  ca.innerHTML='';
  const maxVal=Math.max(...q.dataA,...q.dataB);
  const chartH=160;
  const groupW=100/(q.survey.labels.length);
  q.survey.labels.forEach((label,i)=>{
    const group=document.createElement('div');
    group.className='bar-group';
    group.style.left=(i*groupW+groupW*0.15)+'%';
    group.style.width=(groupW*0.7)+'%';
    const hA=(q.dataA[i]/maxVal)*chartH;
    const hB=(q.dataB[i]/maxVal)*chartH;
    group.innerHTML=`
      <div class="bar a" style="height:0px" data-h="${hA}"></div>
      <div class="bar b" style="height:0px" data-h="${hB}"></div>
      <div class="chart-x-label">${label}</div>
    `;
    ca.appendChild(group);
    // Animate bars
    setTimeout(()=>{
      group.querySelectorAll('.bar').forEach(b=>{b.style.height=b.dataset.h+'px'});
    },100);
  });
  // Y axis labels
  for(let i=0;i<=4;i++){
    const yl=document.createElement('div');
    yl.className='chart-y';
    yl.style.bottom=(i*25)+'%';
    yl.textContent=Math.round(maxVal*i/4);
    ca.appendChild(yl);
  }
  // Data cards
  const dc=document.getElementById('dc');
  dc.innerHTML=q.survey.labels.map((l,i)=>`<div class="data-card">${l}: <span class="val">${q.dataA[i]}/${q.dataB[i]}</span></div>`).join('');
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.options.forEach(o=>{
    const d=document.createElement('div');
    d.className='opt';
    d.textContent=o;
    d.onclick=()=>pick(o,d,q);
    opts.appendChild(d);
  });
}

function pick(val,el,q){
  if(ans)return;
  ans=true;
  const fb=document.getElementById('fb');
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
  if(val===q.correct){
    sc+=10;
    document.getElementById('sv').textContent=sc;
    el.classList.add('correct');
    fb.className='fb show ok';
    fb.textContent='✅ 正确！答案是 '+q.correct;
  }else{
    el.classList.add('wrong');
    fb.className='fb show no';
    fb.textContent='❌ 正确答案是 '+q.correct;
  }
  setTimeout(()=>{rd++;next()},2000);
}

function end(){
  show('gs',false);show('es',true);
  document.getElementById('fsc').textContent=sc;
  const s=sc>=90?3:sc>=60?2:sc>=30?1:0;
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="star ${i<s?'filled':''}">★</span>`;
  document.getElementById('sd').innerHTML=h;
  document.getElementById('et').textContent=s>=3?'🏆 统计大师！':s>=2?'🎉 表现不错！':'💪 继续加油！';
  const m=['继续加油哦！','还不错，再努力一下！','很棒，你真厉害！','太优秀了，满分！'];
  document.getElementById('em').textContent=m[s];
  if(SN)document.getElementById('snn').textContent='玩家：'+SN;
}
</script>
</body>
</html>
