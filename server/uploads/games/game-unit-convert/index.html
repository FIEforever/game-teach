<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>厨房换算 - 单位换算</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC',sans-serif;background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 50%,#fdfcfb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.gc{width:100%;max-width:480px;padding:16px}
.screen{display:none;text-align:center}
.screen.active{display:block}
.start-screen{color:#fff}
.start-screen h1{font-size:28px;text-shadow:2px 2px 4px rgba(0,0,0,0.2);margin-bottom:8px}
.start-screen p{font-size:15px;opacity:0.9;margin-bottom:20px}
.kitchen-preview{font-size:48px;margin:16px 0;animation:cook 2s ease-in-out infinite}
@keyframes cook{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
.btn{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.2);transition:transform .2s}
.btn:hover{transform:scale(1.05)}
.gh{display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:10px}
.gh span{background:rgba(255,255,255,0.3);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.pb{height:8px;background:rgba(255,255,255,0.3);border-radius:4px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:#fff;border-radius:4px;transition:width .5s}
.ga{background:#fff;border-radius:24px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.1);min-height:420px}
.qb{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border-radius:16px;padding:14px;margin-bottom:14px;font-size:15px;font-weight:700;color:#E65100;line-height:1.6}
.kitchen-scene{position:relative;height:140px;background:linear-gradient(135deg,#FFECB3,#FFE0B2);border-radius:16px;margin:12px 0;overflow:hidden;border:3px solid #FFB74D}
.kitchen-counter{position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(135deg,#8D6E63,#6D4C41);border-radius:0 0 13px 13px}
.ingredient{position:absolute;font-size:32px;animation:ingredientBounce 2s ease-in-out infinite}
@keyframes ingredientBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.recipe-card{background:#FFF8E1;border:2px solid #FFB74D;border-radius:12px;padding:12px;margin:10px 0;font-size:14px;color:#5D4037;text-align:left}
.recipe-card .recipe-title{font-weight:700;font-size:15px;margin-bottom:6px;color:#E65100}
.recipe-card .recipe-item{padding:3px 0;display:flex;justify-content:space-between}
.recipe-card .recipe-item .need{color:#e74c3c;font-weight:700}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.opt{padding:12px;border:3px solid #E0E0E0;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;background:#fff}
.opt:hover{border-color:#e74c3c;transform:scale(1.03)}
.opt.correct{border-color:#4CAF50;background:#E8F5E9;animation:pulse .5s}
.opt.wrong{border-color:#f44336;background:#FFEBEE;animation:shake .5s}
.opt.disabled{pointer-events:none;opacity:0.5}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fb{text-align:center;padding:10px;border-radius:12px;margin-top:10px;font-size:14px;font-weight:600;display:none}
.fb.show{display:block;animation:fadeIn .3s}
.fb.ok{background:#E8F5E9;color:#2E7D32}
.fb.no{background:#FFEBEE;color:#C62828}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.end-screen{color:#fff}
.end-screen h1{font-size:28px;margin-bottom:16px}
.fs{font-size:64px;font-weight:800;margin:16px 0}
.sd{font-size:48px;margin:16px 0}
.star{display:inline-block;color:#555;transition:all .5s}
.star.filled{color:#FFD700;animation:starPop .5s}
@keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sn{font-size:14px;opacity:0.7;margin-top:8px}
</style>
</head>
<body>
<div class="gc">
  <div class="screen start-screen active" id="ss">
    <h1>🍳 厨房换算</h1>
    <p>单位换算 · 四年级</p>
    <div class="kitchen-preview">🍳🧁🥄</div>
    <p style="font-size:13px;opacity:0.8;margin-bottom:20px">在厨房里进行单位换算<br>按照食谱做出美味！共10关</p>
    <button class="btn" onclick="startGame()">开始烹饪 →</button>
  </div>
  <div class="screen" id="gs">
    <div class="gh">
      <span>第 <span id="rn">1</span>/10 关</span>
      <span>⭐ <span id="sv">0</span>分</span>
    </div>
    <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
    <div class="ga">
      <div class="qb" id="qb">帮厨师完成单位换算！</div>
      <div class="kitchen-scene" id="ks">
        <div class="kitchen-counter"></div>
      </div>
      <div class="recipe-card" id="rc"></div>
      <div class="options" id="opts"></div>
      <div class="fb" id="fb"></div>
    </div>
  </div>
  <div class="screen end-screen" id="es">
    <h1 id="et">🎉 烹饪完成！</h1>
    <div class="fs" id="fsc">0</div>
    <div class="sd" id="sd"></div>
    <p id="em" style="font-size:16px;margin-bottom:20px;opacity:0.9"></p>
    <p class="sn" id="snn"></p>
    <button class="btn" onclick="startGame()">再来一次 →</button>
  </div>
</div>
<script>
const P=new URLSearchParams(location.search);
const SN=P.get('student')||'';
const T=10;
let rd=0,sc=0,qs=[],ans=false;

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function genQ(){
  const r=[];
  const conversions=[
    {from:'m',to:'cm',factor:100,emoji:'📏',name:'米→厘米'},
    {from:'cm',to:'mm',factor:10,emoji:'📐',name:'厘米→毫米'},
    {from:'km',to:'m',factor:1000,emoji:'🛣️',name:'千米→米'},
    {from:'kg',to:'g',factor:1000,emoji:'⚖️',name:'千克→克'},
    {from:'g',to:'kg',factor:0.001,emoji:'🍬',name:'克→千克'},
    {from:'m',to:'dm',factor:10,emoji:'📏',name:'米→分米'},
    {from:'dm',to:'cm',factor:10,emoji:'📐',name:'分米→厘米'},
    {from:'t',to:'kg',factor:1000,emoji:'🏋️',name:'吨→千克'},
    {from:'L',to:'mL',factor:1000,emoji:'🥛',name:'升→毫升'},
    {from:'cm',to:'m',factor:0.01,emoji:'📏',name:'厘米→米'},
  ];
  const recipes=[
    {title:'🍰 蛋糕食谱',items:['面粉 2m = ?cm','糖 500g = ?kg','牛奶 1L = ?mL']},
    {title:'🍪 饼干食谱',items:['黄油 200g = ?kg','面粉 3m = ?cm','盐 5g = ?kg']},
    {title:'🧁 纸杯蛋糕',items:['奶油 500mL = ?L','巧克力 2kg = ?g','面粉 1m = ?dm']},
    {title:'🍞 面包食谱',items:['酵母 5g = ?kg','面粉 5m = ?cm','水 300mL = ?L']},
    {title:'🥧 派食谱',items:['水果 2kg = ?g','面粉 3m = ?cm','糖 100g = ?kg']},
  ];
  const shuffled=conversions.sort(()=>Math.random()-0.5);
  for(let i=0;i<T;i++){
    const c=shuffled[i%shuffled.length];
    let val;
    if(c.factor>=1)val=rand(1,10);
    else val=rand(1,50)*100;
    const result=val*c.factor;
    const resultStr=c.factor>=1?result:(result%1===0?result:result.toFixed(result*1000%1===0?0:3));
    const correct=`${resultStr} ${c.to}`;
    const wrongs=generateWrongs(result,c.to);
    const recipe=recipes[i%recipes.length];
    r.push({
      question:`${val} ${c.from} = ? ${c.to}`,
      correct,
      options:[correct,...wrongs].sort(()=>Math.random()-0.5),
      explanation:`${val} ${c.from} = ${val} × ${c.factor} = ${resultStr} ${c.to}`,
      recipe,
      emoji:c.emoji
    });
  }
  return r;
}

function generateWrongs(correct,unit){
  const wrongs=new Set();
  while(wrongs.size<3){
    const off=rand(1,5)*(Math.random()<0.5?1:-1);
    const w=correct+off;
    if(w>0&&w!==correct)wrongs.add(w+' '+unit);
  }
  return [...wrongs].slice(0,3);
}

function startGame(){
  rd=0;sc=0;qs=genQ();
  show('ss',false);show('es',false);show('gs',true);
  next();
}

function show(id,v){document.getElementById(id).classList.toggle('active',v)}

function next(){
  if(rd>=T){end();return}
  ans=false;
  const q=qs[rd];
  document.getElementById('fb').className='fb';
  document.getElementById('rn').textContent=rd+1;
  document.getElementById('pb').style.width=(rd/T*100)+'%';
  document.getElementById('qb').textContent=q.question;
  // Kitchen scene
  const ks=document.getElementById('ks');
  ks.querySelectorAll('.ingredient').forEach(i=>i.remove());
  const ings=['🥚','🧈','🥛','🧂','🌾','🍯'];
  for(let i=0;i<3;i++){
    const ing=document.createElement('div');
    ing.className='ingredient';
    ing.textContent=ings[rand(0,ings.length-1)];
    ing.style.left=(15+i*30)+'%';
    ing.style.top=(10+rand(0,30))+'%';
    ing.style.animationDelay=(i*0.3)+'s';
    ks.insertBefore(ing,ks.querySelector('.kitchen-counter'));
  }
  // Recipe card
  const rc=document.getElementById('rc');
  rc.innerHTML=`<div class="recipe-title">${q.recipe.title}</div>${q.recipe.items.map(item=>`<div class="recipe-item"><span>${item.split('=')[0]}</span><span class="need">需要换算</span></div>`).join('')}`;
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.options.forEach(o=>{
    const d=document.createElement('div');
    d.className='opt';
    d.textContent=o;
    d.onclick=()=>pick(o,d);
    opts.appendChild(d);
  });
}

function pick(val,el){
  if(ans)return;
  ans=true;
  const q=qs[rd];
  const fb=document.getElementById('fb');
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
  if(val===q.correct){
    sc+=10;
    document.getElementById('sv').textContent=sc;
    el.classList.add('correct');
    fb.className='fb show ok';
    fb.textContent='✅ 正确！'+q.explanation;
  }else{
    el.classList.add('wrong');
    fb.className='fb show no';
    fb.textContent='❌ 正确答案是 '+q.correct;
  }
  setTimeout(()=>{rd++;next()},2000);
}

function end(){
  show('gs',false);show('es',true);
  document.getElementById('fsc').textContent=sc;
  const s=sc>=90?3:sc>=60?2:sc>=30?1:0;
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="star ${i<s?'filled':''}">★</span>`;
  document.getElementById('sd').innerHTML=h;
  document.getElementById('et').textContent=s>=3?'🏆 厨神！':s>=2?'🎉 表现不错！':'💪 继续加油！';
  const m=['继续加油哦！','还不错，再努力一下！','很棒，你真厉害！','太优秀了，满分！'];
  document.getElementById('em').textContent=m[s];
  if(SN)document.getElementById('snn').textContent='玩家：'+SN;
}
</script>
</body>
</html>
