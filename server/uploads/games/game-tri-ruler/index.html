<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三角尺子 - 三边关系</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.gc{width:100%;max-width:480px;padding:16px}
.screen{display:none;text-align:center}
.screen.active{display:block}
.start-screen{color:#fff}
.start-screen h1{font-size:28px;text-shadow:2px 2px 4px rgba(0,0,0,0.2);margin-bottom:8px}
.start-screen p{font-size:15px;opacity:0.9;margin-bottom:20px}
.ruler-preview{font-size:48px;margin:16px 0;animation:measure 2s ease-in-out infinite}
@keyframes measure{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-10deg)}}
.btn{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.2);transition:transform .2s}
.btn:hover{transform:scale(1.05)}
.gh{display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:10px}
.gh span{background:rgba(255,255,255,0.2);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.pb{height:8px;background:rgba(255,255,255,0.2);border-radius:4px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:#fff;border-radius:4px;transition:width .5s}
.ga{background:#fff;border-radius:24px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.15);min-height:420px}
.qb{background:linear-gradient(135deg,#EDE7F6,#D1C4E9);border-radius:16px;padding:14px;margin-bottom:14px;font-size:15px;font-weight:700;color:#4527A0}
.stick-area{position:relative;height:200px;background:linear-gradient(135deg,#FFF8E1,#FFECB3);border-radius:16px;margin:12px 0;overflow:hidden;border:3px solid #FFB74D}
.stick{position:absolute;height:8px;border-radius:4px;transition:all .5s;cursor:pointer}
.stick:hover{filter:brightness(1.2)}
.stick.s1{background:linear-gradient(90deg,#e74c3c,#ff6b6b);top:40px;left:20px}
.stick.s2{background:linear-gradient(90deg,#3498db,#5dade2);top:80px;left:20px}
.stick.s3{background:linear-gradient(90deg,#2ecc71,#58d68d);top:120px;left:20px}
.stick-label{position:absolute;top:-20px;left:0;font-size:12px;font-weight:700;color:#333}
.ruler-mark{position:absolute;top:160px;left:20px;height:2px;background:#999}
.triangle-result{position:absolute;top:30px;right:20px;font-size:60px;transition:all .5s;opacity:0}
.triangle-result.show{opacity:1;animation:popIn .5s}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.stick-info{display:flex;gap:8px;justify-content:center;margin:8px 0}
.stick-badge{padding:4px 12px;border-radius:8px;font-size:13px;font-weight:700;color:#fff}
.stick-badge.b1{background:#e74c3c}
.stick-badge.b2{background:#3498db}
.stick-badge.b3{background:#2ecc71}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.opt{padding:14px;border:3px solid #E0E0E0;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;background:#fff}
.opt:hover{border-color:#764ba2;transform:scale(1.03)}
.opt.correct{border-color:#4CAF50;background:#E8F5E9;animation:pulse .5s}
.opt.wrong{border-color:#f44336;background:#FFEBEE;animation:shake .5s}
.opt.disabled{pointer-events:none;opacity:0.5}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fb{text-align:center;padding:10px;border-radius:12px;margin-top:10px;font-size:14px;font-weight:600;display:none}
.fb.show{display:block;animation:fadeIn .3s}
.fb.ok{background:#E8F5E9;color:#2E7D32}
.fb.no{background:#FFEBEE;color:#C62828}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.hint{font-size:12px;color:#999;margin-top:8px}
.end-screen{color:#fff}
.end-screen h1{font-size:28px;margin-bottom:16px}
.fs{font-size:64px;font-weight:800;margin:16px 0}
.sd{font-size:48px;margin:16px 0}
.star{display:inline-block;color:#555;transition:all .5s}
.star.filled{color:#FFD700;animation:starPop .5s}
@keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sn{font-size:14px;opacity:0.7;margin-top:8px}
</style>
</head>
<body>
<div class="gc">
  <div class="screen start-screen active" id="ss">
    <h1>📏 三角尺子</h1>
    <p>三角形三边关系 · 四年级</p>
    <div class="ruler-preview">📏📐📏</div>
    <p style="font-size:13px;opacity:0.8;margin-bottom:20px">三根小棒能组成三角形吗？<br>判断三角形三边关系！共10关</p>
    <button class="btn" onclick="startGame()">开始测量 →</button>
  </div>
  <div class="screen" id="gs">
    <div class="gh">
      <span>第 <span id="rn">1</span>/10 关</span>
      <span>⭐ <span id="sv">0</span>分</span>
    </div>
    <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
    <div class="ga">
      <div class="qb" id="qb">这三根小棒能组成三角形吗？</div>
      <div class="stick-area" id="sa">
        <div class="stick s1" id="s1"><div class="stick-label" id="l1"></div></div>
        <div class="stick s2" id="s2"><div class="stick-label" id="l2"></div></div>
        <div class="stick s3" id="s3"><div class="stick-label" id="l3"></div></div>
        <div class="triangle-result" id="tr"></div>
      </div>
      <div class="stick-info">
        <span class="stick-badge b1" id="b1"></span>
        <span class="stick-badge b2" id="b2"></span>
        <span class="stick-badge b3" id="b3"></span>
      </div>
      <div class="hint" id="hint">💡 任意两边之和大于第三边</div>
      <div class="options">
        <div class="opt" id="c1" onclick="answer(true)">✅ 能组成</div>
        <div class="opt" id="c2" onclick="answer(false)">❌ 不能组成</div>
      </div>
      <div class="fb" id="fb"></div>
    </div>
  </div>
  <div class="screen end-screen" id="es">
    <h1 id="et">🎉 测量结束！</h1>
    <div class="fs" id="fsc">0</div>
    <div class="sd" id="sd"></div>
    <p id="em" style="font-size:16px;margin-bottom:20px;opacity:0.9"></p>
    <p class="sn" id="snn"></p>
    <button class="btn" onclick="startGame()">再来一次 →</button>
  </div>
</div>
<script>
const P=new URLSearchParams(location.search);
const SN=P.get('student')||'';
const T=10;
let rd=0,sc=0,qs=[],ans=false;

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function canFormTriangle(a,b,c){
  return a+b>c&&a+c>b&&b+c>a;
}

function genQ(){
  const r=[];
  for(let i=0;i<T;i++){
    let a,b,c,canForm;
    if(Math.random()<0.5){
      // Can form triangle
      a=rand(3,10);b=rand(3,10);
      c=rand(Math.abs(a-b)+1,a+b-1);
      canForm=true;
    }else{
      // Cannot form triangle
      a=rand(3,10);b=rand(3,10);
      c=rand(1,Math.abs(a-b));
      if(c===0)c=Math.abs(a-b);
      canForm=false;
    }
    const sorted=[a,b,c].sort((x,y)=>x-y);
    r.push({
      sides:[a,b,c],
      sorted,
      canForm,
      check:`${sorted[0]}+${sorted[1]}=${sorted[0]+sorted[1]} ${sorted[0]+sorted[1]>sorted[2]?'>':'<='} ${sorted[2]}`
    });
  }
  return r;
}

function startGame(){
  rd=0;sc=0;qs=genQ();
  show('ss',false);show('es',false);show('gs',true);
  next();
}

function show(id,v){document.getElementById(id).classList.toggle('active',v)}

function next(){
  if(rd>=T){end();return}
  ans=false;
  const q=qs[rd];
  document.getElementById('fb').className='fb';
  document.getElementById('c1').className='opt';
  document.getElementById('c2').className='opt';
  document.getElementById('rn').textContent=rd+1;
  document.getElementById('pb').style.width=(rd/T*100)+'%';
  document.getElementById('tr').className='triangle-result';
  document.getElementById('tr').textContent='';
  const maxW=Math.max(...q.sides);
  const scale=200/maxW;
  q.sides.forEach((s,i)=>{
    const stick=document.getElementById('s'+(i+1));
    stick.style.width=(s*scale)+'px';
    document.getElementById('l'+(i+1)).textContent=s+'cm';
    document.getElementById('b'+(i+1)).textContent=s+'cm';
  });
}

function answer(userSaysYes){
  if(ans)return;
  ans=true;
  const q=qs[rd];
  const fb=document.getElementById('fb');
  const isCorrect=(userSaysYes===q.canForm);
  document.getElementById('c1').classList.add('disabled');
  document.getElementById('c2').classList.add('disabled');
  const tr=document.getElementById('tr');
  if(isCorrect){
    sc+=10;
    document.getElementById('sv').textContent=sc;
    fb.className='fb show ok';
    if(q.canForm){
      tr.textContent='🔺';
      tr.className='triangle-result show';
      fb.textContent=`✅ 正确！${q.check}，能组成三角形`;
    }else{
      tr.textContent='✗';
      tr.className='triangle-result show';
      fb.textContent=`✅ 正确！${q.check}，不能组成三角形`;
    }
    document.getElementById(userSaysYes?'c1':'c2').classList.add('correct');
  }else{
    fb.className='fb show no';
    fb.textContent=`❌ ${q.check}，${q.canForm?'能':'不能'}组成三角形`;
    document.getElementById(userSaysYes?'c1':'c2').classList.add('wrong');
  }
  setTimeout(()=>{rd++;next()},2200);
}

function end(){
  show('gs',false);show('es',true);
  document.getElementById('fsc').textContent=sc;
  const s=sc>=90?3:sc>=60?2:sc>=30?1:0;
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="star ${i<s?'filled':''}">★</span>`;
  document.getElementById('sd').innerHTML=h;
  document.getElementById('et').textContent=s>=3?'🏆 测量大师！':s>=2?'🎉 表现不错！':'💪 继续加油！';
  const m=['继续加油哦！','还不错，再努力一下！','很棒，你真厉害！','太优秀了，满分！'];
  document.getElementById('em').textContent=m[s];
  if(SN)document.getElementById('snn').textContent='玩家：'+SN;
}
</script>
</body>
</html>
