<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小数电话 - 小数读写法</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC',sans-serif;background:linear-gradient(135deg,#f5af19 0%,#f12711 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.gc{width:100%;max-width:480px;padding:16px}
.screen{display:none;text-align:center}
.screen.active{display:block}
.start-screen{color:#fff}
.start-screen h1{font-size:28px;text-shadow:2px 2px 4px rgba(0,0,0,0.2);margin-bottom:8px}
.start-screen p{font-size:15px;opacity:0.9;margin-bottom:20px}
.phone-preview{font-size:48px;margin:16px 0;animation:ring 1s ease-in-out infinite}
@keyframes ring{0%,100%{transform:rotate(0deg)}10%{transform:rotate(15deg)}20%{transform:rotate(-15deg)}30%{transform:rotate(10deg)}40%{transform:rotate(0deg)}}
.btn{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.2);transition:transform .2s}
.btn:hover{transform:scale(1.05)}
.gh{display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:10px}
.gh span{background:rgba(255,255,255,0.2);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.pb{height:8px;background:rgba(255,255,255,0.2);border-radius:4px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:#fff;border-radius:4px;transition:width .5s}
.ga{background:#fff;border-radius:24px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.15);min-height:420px}
.qb{background:linear-gradient(135deg,#FFF8E1,#FFECB3);border-radius:16px;padding:14px;margin-bottom:14px;font-size:15px;font-weight:700;color:#E65100}
.phone{width:200px;height:280px;margin:12px auto;background:linear-gradient(135deg,#333,#555);border-radius:30px;padding:15px;box-shadow:0 10px 30px rgba(0,0,0,0.3);position:relative}
.phone-screen{width:100%;height:60px;background:#111;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#0f0;font-family:monospace;letter-spacing:3px;margin-bottom:15px}
.dial-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.dial-btn{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#555,#444);border:2px solid #666;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;cursor:pointer;transition:all .2s;margin:0 auto}
.dial-btn:hover{background:linear-gradient(135deg,#666,#555);transform:scale(1.1)}
.dial-btn:active{transform:scale(0.95)}
.dial-btn.dot{font-size:24px}
.phone-base{width:60px;height:4px;background:#666;border-radius:2px;margin:10px auto 0}
.call-display{font-size:28px;font-weight:800;padding:12px;background:#F5F5F5;border-radius:12px;margin:10px 0;color:#333;min-height:50px;display:flex;align-items:center;justify-content:center}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.opt{padding:12px;border:3px solid #E0E0E0;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;background:#fff}
.opt:hover{border-color:#e67e22;transform:scale(1.03)}
.opt.correct{border-color:#4CAF50;background:#E8F5E9;animation:pulse .5s}
.opt.wrong{border-color:#f44336;background:#FFEBEE;animation:shake .5s}
.opt.disabled{pointer-events:none;opacity:0.5}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fb{text-align:center;padding:10px;border-radius:12px;margin-top:10px;font-size:14px;font-weight:600;display:none}
.fb.show{display:block;animation:fadeIn .3s}
.fb.ok{background:#E8F5E9;color:#2E7D32}
.fb.no{background:#FFEBEE;color:#C62828}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.end-screen{color:#fff}
.end-screen h1{font-size:28px;margin-bottom:16px}
.fs{font-size:64px;font-weight:800;margin:16px 0}
.sd{font-size:48px;margin:16px 0}
.star{display:inline-block;color:#555;transition:all .5s}
.star.filled{color:#FFD700;animation:starPop .5s}
@keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sn{font-size:14px;opacity:0.7;margin-top:8px}
</style>
</head>
<body>
<div class="gc">
  <div class="screen start-screen active" id="ss">
    <h1>📞 小数电话</h1>
    <p>小数读写法 · 四年级</p>
    <div class="phone-preview">📞📱</div>
    <p style="font-size:13px;opacity:0.8;margin-bottom:20px">正确读出和写出小数<br>拨通正确的号码！共10关</p>
    <button class="btn" onclick="startGame()">开始拨号 →</button>
  </div>
  <div class="screen" id="gs">
    <div class="gh">
      <span>第 <span id="rn">1</span>/10 关</span>
      <span>⭐ <span id="sv">0</span>分</span>
    </div>
    <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
    <div class="ga">
      <div class="qb" id="qb">读出下面的小数</div>
      <div class="phone">
        <div class="phone-screen" id="ps">0.00</div>
        <div class="dial-pad">
          <div class="dial-btn">1</div><div class="dial-btn">2</div><div class="dial-btn">3</div>
          <div class="dial-btn">4</div><div class="dial-btn">5</div><div class="dial-btn">6</div>
          <div class="dial-btn">7</div><div class="dial-btn">8</div><div class="dial-btn">9</div>
          <div class="dial-btn dot">.</div><div class="dial-btn">0</div><div class="dial-btn">⌫</div>
        </div>
        <div class="phone-base"></div>
      </div>
      <div class="call-display" id="cd">等待拨号...</div>
      <div class="options" id="opts"></div>
      <div class="fb" id="fb"></div>
    </div>
  </div>
  <div class="screen end-screen" id="es">
    <h1 id="et">🎉 通话结束！</h1>
    <div class="fs" id="fsc">0</div>
    <div class="sd" id="sd"></div>
    <p id="em" style="font-size:16px;margin-bottom:20px;opacity:0.9"></p>
    <p class="sn" id="snn"></p>
    <button class="btn" onclick="startGame()">再来一次 →</button>
  </div>
</div>
<script>
const P=new URLSearchParams(location.search);
const SN=P.get('student')||'';
const T=10;
let rd=0,sc=0,qs=[],ans=false;

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function decimalToChinese(d){
  const s=String(d);
  const parts=s.split('.');
  const intPart=parseInt(parts[0]);
  let result='';
  if(intPart===0)result='零';
  else result=numberToChinese(intPart);
  result+='点';
  for(const c of parts[1]){
    result+=digitToChinese(c);
  }
  return result;
}

function numberToChinese(n){
  const digits=['零','一','二','三','四','五','六','七','八','九'];
  return String(n).split('').map(d=>digits[parseInt(d)]).join('');
}

function digitToChinese(d){
  return ['零','一','二','三','四','五','六','七','八','九'][parseInt(d)];
}

function genQ(){
  const r=[];
  for(let i=0;i<T;i++){
    const type=rand(0,1);
    if(type===0){
      // Read: show decimal, pick correct reading
      const intPart=rand(0,9);
      const decPart=rand(1,99);
      const decStr=decPart<10?'0'+decPart:String(decPart);
      const decimal=String(intPart)+'.'+decStr;
      const correct=decimalToChinese(decimal);
      const wrongs=generateWrongReadings(correct);
      r.push({
        type:'read',
        question:`请读出这个小数：`,
        display:decimal,
        correct,
        options:[correct,...wrongs].sort(()=>Math.random()-0.5)
      });
    }else{
      // Write: show reading, pick correct decimal
      const intPart=rand(0,9);
      const decDigits=[];
      const len=rand(1,2);
      for(let j=0;j<len;j++)decDigits.push(rand(1,9));
      const decStr=decDigits.join('');
      const decimal=intPart+'.'+(len===1?'0'+decStr:decStr);
      const reading=decimalToChinese(parseFloat(decimal));
      const wrongs=generateWrongDecimals(decimal);
      r.push({
        type:'write',
        question:`"${reading}" 写成小数是：`,
        display:reading,
        correct:decimal,
        options:[decimal,...wrongs].sort(()=>Math.random()-0.5)
      });
    }
  }
  return r;
}

function generateWrongReadings(correct){
  const wrongs=new Set();
  const changes=['一','二','三','四','五','六','七','八','九'];
  while(wrongs.size<3){
    const w=correct.replace(/./g,(c,i)=>{
      if(i>0&&Math.random()<0.3){
        return changes[rand(0,changes.length-1)];
      }
      return c;
    });
    if(w!==correct)wrongs.add(w);
  }
  return [...wrongs].slice(0,3);
}

function generateWrongDecimals(correct){
  const wrongs=new Set();
  while(wrongs.size<3){
    const parts=correct.split('.');
    const intP=parseInt(parts[0]);
    const decP=parts[1];
    const newInt=intP+rand(-1,1);
    const newDec=(parseInt(decP)+rand(-1,1));
    if(newInt>=0&&newDec>=0&&newDec<100){
      const w=newInt+'.'+(newDec<10?'0'+newDec:String(newDec));
      if(w!==correct)wrongs.add(w);
    }
  }
  return [...wrongs].slice(0,3);
}

function startGame(){
  rd=0;sc=0;qs=genQ();
  show('ss',false);show('es',false);show('gs',true);
  next();
}

function show(id,v){document.getElementById(id).classList.toggle('active',v)}

function next(){
  if(rd>=T){end();return}
  ans=false;
  const q=qs[rd];
  document.getElementById('fb').className='fb';
  document.getElementById('rn').textContent=rd+1;
  document.getElementById('pb').style.width=(rd/T*100)+'%';
  if(q.type==='read'){
    document.getElementById('qb').textContent=q.question;
    document.getElementById('ps').textContent=q.display;
    document.getElementById('cd').textContent='选择正确的读法';
  }else{
    document.getElementById('qb').textContent=q.question;
    document.getElementById('ps').textContent='?.??';
    document.getElementById('cd').textContent=q.display;
  }
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.options.forEach(o=>{
    const d=document.createElement('div');
    d.className='opt';
    d.textContent=o;
    d.onclick=()=>pick(o,d);
    opts.appendChild(d);
  });
}

function pick(val,el){
  if(ans)return;
  ans=true;
  const q=qs[rd];
  const fb=document.getElementById('fb');
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
  if(val===q.correct){
    sc+=10;
    document.getElementById('sv').textContent=sc;
    el.classList.add('correct');
    fb.className='fb show ok';
    fb.textContent='✅ 正确！拨号成功！';
    document.getElementById('ps').textContent=q.type==='read'?q.display:q.correct;
    document.getElementById('ps').style.color='#0f0';
  }else{
    el.classList.add('wrong');
    fb.className='fb show no';
    fb.textContent='❌ 拨号错误！正确答案是：'+q.correct;
    document.getElementById('ps').style.color='#f00';
  }
  setTimeout(()=>{
    document.getElementById('ps').style.color='#0f0';
    rd++;next();
  },2000);
}

function end(){
  show('gs',false);show('es',true);
  document.getElementById('fsc').textContent=sc;
  const s=sc>=90?3:sc>=60?2:sc>=30?1:0;
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="star ${i<s?'filled':''}">★</span>`;
  document.getElementById('sd').innerHTML=h;
  document.getElementById('et').textContent=s>=3?'🏆 通信大师！':s>=2?'🎉 表现不错！':'💪 继续加油！';
  const m=['继续加油哦！','还不错，再努力一下！','很棒，你真厉害！','太优秀了，满分！'];
  document.getElementById('em').textContent=m[s];
  if(SN)document.getElementById('snn').textContent='玩家：'+SN;
}
</script>
</body>
</html>
