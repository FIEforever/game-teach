<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天平平衡 - 平均数</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC',sans-serif;background:linear-gradient(135deg,#89f7fe 0%,#66a6ff 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.gc{width:100%;max-width:480px;padding:16px}
.screen{display:none;text-align:center}
.screen.active{display:block}
.start-screen{color:#fff}
.start-screen h1{font-size:28px;text-shadow:2px 2px 4px rgba(0,0,0,0.2);margin-bottom:8px}
.start-screen p{font-size:15px;opacity:0.9;margin-bottom:20px}
.balance-preview{font-size:48px;margin:16px 0;animation:balanceAnim 3s ease-in-out infinite}
@keyframes balanceAnim{0%,100%{transform:rotate(0deg)}25%{transform:rotate(5deg)}75%{transform:rotate(-5deg)}}
.btn{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.2);transition:transform .2s}
.btn:hover{transform:scale(1.05)}
.gh{display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:10px}
.gh span{background:rgba(255,255,255,0.3);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.pb{height:8px;background:rgba(255,255,255,0.3);border-radius:4px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:#fff;border-radius:4px;transition:width .5s}
.ga{background:#fff;border-radius:24px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.1);min-height:420px}
.qb{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);border-radius:16px;padding:14px;margin-bottom:14px;font-size:15px;font-weight:700;color:#1565C0;line-height:1.6}
.balance{position:relative;height:160px;margin:12px 0}
.balance-base{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:20px;background:#795548;border-radius:4px}
.balance-pole{position:absolute;bottom:18px;left:50%;width:4px;height:80px;background:#795548;transform:translateX(-50%);transform-origin:bottom center;transition:transform .5s}
.balance-beam{position:absolute;top:20px;left:50%;width:280px;height:8px;background:#8D6E63;border-radius:4px;transform:translateX(-50%);transform-origin:center center;transition:transform .5s}
.balance-beam.tilted{transform:translateX(-50%) rotate(var(--tilt,0deg))}
.pan{position:absolute;top:28px;width:80px;height:50px;border-radius:0 0 12px 12px;transition:all .5s;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.pan.left-pan{left:20px;background:linear-gradient(135deg,#e74c3c,#c0392b)}
.pan.right-pan{right:20px;background:linear-gradient(135deg,#3498db,#2980b9)}
.pan-weight{font-size:24px;font-weight:800}
.pan-label{font-size:11px;margin-top:2px}
.numbers-display{display:flex;gap:8px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.num-badge{padding:6px 12px;background:#E3F2FD;border:2px solid #90CAF9;border-radius:10px;font-size:14px;font-weight:700;color:#1565C0}
.avg-display{font-size:22px;font-weight:800;padding:10px;background:#E3F2FD;border-radius:12px;margin:8px 0;color:#1565C0}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.opt{padding:12px;border:3px solid #E0E0E0;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;background:#fff}
.opt:hover{border-color:#1565C0;transform:scale(1.03)}
.opt.correct{border-color:#4CAF50;background:#E8F5E9;animation:pulse .5s}
.opt.wrong{border-color:#f44336;background:#FFEBEE;animation:shake .5s}
.opt.disabled{pointer-events:none;opacity:0.5}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fb{text-align:center;padding:10px;border-radius:12px;margin-top:10px;font-size:14px;font-weight:600;display:none}
.fb.show{display:block;animation:fadeIn .3s}
.fb.ok{background:#E8F5E9;color:#2E7D32}
.fb.no{background:#FFEBEE;color:#C62828}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.end-screen{color:#fff}
.end-screen h1{font-size:28px;margin-bottom:16px}
.fs{font-size:64px;font-weight:800;margin:16px 0}
.sd{font-size:48px;margin:16px 0}
.star{display:inline-block;color:#555;transition:all .5s}
.star.filled{color:#FFD700;animation:starPop .5s}
@keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sn{font-size:14px;opacity:0.7;margin-top:8px}
</style>
</head>
<body>
<div class="gc">
  <div class="screen start-screen active" id="ss">
    <h1>⚖️ 天平平衡</h1>
    <p>平均数 · 四年级</p>
    <div class="balance-preview">⚖️📊🔢</div>
    <p style="font-size:13px;opacity:0.8;margin-bottom:20px">让天平平衡<br>求出平均数！共10关</p>
    <button class="btn" onclick="startGame()">开始称重 →</button>
  </div>
  <div class="screen" id="gs">
    <div class="gh">
      <span>第 <span id="rn">1</span>/10 关</span>
      <span>⭐ <span id="sv">0</span>分</span>
    </div>
    <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
    <div class="ga">
      <div class="qb" id="qb">求出下面数据的平均数</div>
      <div class="balance" id="bal">
        <div class="balance-beam" id="beam"></div>
        <div class="pan left-pan" id="lp"></div>
        <div class="pan right-pan" id="rp"></div>
        <div class="balance-pole"></div>
        <div class="balance-base"></div>
      </div>
      <div class="numbers-display" id="nd"></div>
      <div class="avg-display" id="ad">平均数 = ?</div>
      <div class="options" id="opts"></div>
      <div class="fb" id="fb"></div>
    </div>
  </div>
  <div class="screen end-screen" id="es">
    <h1 id="et">🎉 称重完成！</h1>
    <div class="fs" id="fsc">0</div>
    <div class="sd" id="sd"></div>
    <p id="em" style="font-size:16px;margin-bottom:20px;opacity:0.9"></p>
    <p class="sn" id="snn"></p>
    <button class="btn" onclick="startGame()">再来一次 →</button>
  </div>
</div>
<script>
const P=new URLSearchParams(location.search);
const SN=P.get('student')||'';
const T=10;
let rd=0,sc=0,qs=[],ans=false;

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function genQ(){
  const r=[];
  for(let i=0;i<T;i++){
    const count=rand(3,5);
    const nums=[];
    for(let j=0;j<count;j++)nums.push(rand(1,20));
    const sum=nums.reduce((a,b)=>a+b,0);
    const avg=sum/count;
    const avgStr=Number.isInteger(avg)?String(avg):avg.toFixed(1);
    const wrongs=generateWrongs(avg);
    r.push({nums,sum,avg:parseFloat(avgStr),avgStr,options:[avgStr,...wrongs].sort(()=>Math.random()-0.5)});
  }
  return r;
}

function generateWrongs(correct){
  const wrongs=new Set();
  while(wrongs.size<3){
    const off=(rand(1,5))*(Math.random()<0.5?1:-1);
    const w=Math.round((correct+off)*10)/10;
    if(w>0&&w!==correct)wrongs.add(Number.isInteger(w)?String(w):w.toFixed(1));
  }
  return [...wrongs].slice(0,3);
}

function startGame(){
  rd=0;sc=0;qs=genQ();
  show('ss',false);show('es',false);show('gs',true);
  next();
}

function show(id,v){document.getElementById(id).classList.toggle('active',v)}

function next(){
  if(rd>=T){end();return}
  ans=false;
  const q=qs[rd];
  document.getElementById('fb').className='fb';
  document.getElementById('rn').textContent=rd+1;
  document.getElementById('pb').style.width=(rd/T*100)+'%';
  document.getElementById('qb').textContent=`求 ${q.nums.join('、')} 的平均数`;
  document.getElementById('ad').textContent='平均数 = ?';
  // Balance - initially tilted
  document.getElementById('beam').style.transform='translateX(-50%) rotate(-5deg)';
  document.getElementById('lp').innerHTML=`<div><div class="pan-weight">${q.sum}</div><div class="pan-label">总和</div></div>`;
  document.getElementById('rp').innerHTML=`<div><div class="pan-weight">?</div><div class="pan-label">平均数</div></div>`;
  // Numbers
  const nd=document.getElementById('nd');
  nd.innerHTML=q.nums.map(n=>`<span class="num-badge">${n}</span>`).join('');
  // Options
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.options.forEach(o=>{
    const d=document.createElement('div');
    d.className='opt';
    d.textContent=o;
    d.onclick=()=>pick(o,d,q);
    opts.appendChild(d);
  });
}

function pick(val,el,q){
  if(ans)return;
  ans=true;
  const fb=document.getElementById('fb');
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
  if(parseFloat(val)===q.avg){
    sc+=10;
    document.getElementById('sv').textContent=sc;
    el.classList.add('correct');
    fb.className='fb show ok';
    fb.textContent=`✅ 正确！(${q.nums.join('+')}) ÷ ${q.nums.length} = ${q.sum} ÷ ${q.nums.length} = ${q.avgStr}`;
    document.getElementById('ad').innerHTML='平均数 = <span style="color:#4CAF50">'+q.avgStr+'</span>';
    // Balance the beam
    document.getElementById('beam').style.transform='translateX(-50%) rotate(0deg)';
    document.getElementById('rp').innerHTML=`<div><div class="pan-weight">${q.avgStr}</div><div class="pan-label">平均数</div></div>`;
  }else{
    el.classList.add('wrong');
    fb.className='fb show no';
    fb.textContent=`❌ 不对哦！(${q.nums.join('+')}) ÷ ${q.nums.length} = ${q.avgStr}`;
  }
  setTimeout(()=>{rd++;next()},2200);
}

function end(){
  show('gs',false);show('es',true);
  document.getElementById('fsc').textContent=sc;
  const s=sc>=90?3:sc>=60?2:sc>=30?1:0;
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="star ${i<s?'filled':''}">★</span>`;
  document.getElementById('sd').innerHTML=h;
  document.getElementById('et').textContent=s>=3?'🏆 平衡大师！':s>=2?'🎉 表现不错！':'💪 继续加油！';
  const m=['继续加油哦！','还不错，再努力一下！','很棒，你真厉害！','太优秀了，满分！'];
  document.getElementById('em').textContent=m[s];
  if(SN)document.getElementById('snn').textContent='玩家：'+SN;
}
</script>
</body>
</html>
