<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码保险箱 - 小数加减法进位退位</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC',sans-serif;background:linear-gradient(135deg,#2c3e50 0%,#34495e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.gc{width:100%;max-width:480px;padding:16px}
.screen{display:none;text-align:center}
.screen.active{display:block}
.start-screen{color:#fff}
.start-screen h1{font-size:28px;text-shadow:2px 2px 4px rgba(0,0,0,0.3);margin-bottom:8px}
.start-screen p{font-size:15px;opacity:0.9;margin-bottom:20px}
.vault-preview{font-size:48px;margin:16px 0;animation:vaultSpin 3s ease-in-out infinite}
@keyframes vaultSpin{0%,100%{transform:rotateY(0deg)}50%{transform:rotateY(15deg)}}
.btn{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.3);transition:transform .2s}
.btn:hover{transform:scale(1.05)}
.gh{display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:10px}
.gh span{background:rgba(255,255,255,0.15);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.pb{height:8px;background:rgba(255,255,255,0.15);border-radius:4px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#f39c12,#e74c3c);border-radius:4px;transition:width .5s}
.ga{background:#fff;border-radius:24px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.15);min-height:420px}
.qb{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border-radius:16px;padding:14px;margin-bottom:14px;font-size:15px;font-weight:700;color:#E65100}
.vault{width:180px;height:180px;margin:12px auto;background:linear-gradient(135deg,#7f8c8d,#95a5a6);border-radius:20px;position:relative;box-shadow:0 10px 30px rgba(0,0,0,0.3);border:4px solid #bdc3c7}
.vault-door{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#95a5a6,#7f8c8d);border-radius:16px;display:flex;align-items:center;justify-content:center;transition:all .5s}
.vault-door.open{transform:perspective(400px) rotateY(-80deg);opacity:0.5}
.vault-handle{width:20px;height:60px;background:#f39c12;border-radius:10px;position:absolute;right:15px;top:50%;transform:translateY(-50%);box-shadow:0 2px 5px rgba(0,0,0,0.3)}
.vault-dial{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#2c3e50,#34495e);border:4px solid #f39c12;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#f39c12;position:relative}
.vault-dial::after{content:'';position:absolute;top:8px;left:50%;width:3px;height:15px;background:#f39c12;transform:translateX(-50%);border-radius:2px}
.vault-inner{position:absolute;top:20%;left:20%;right:20%;bottom:20%;background:linear-gradient(135deg,#f39c12,#e67e22);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:36px;opacity:0;transition:opacity .5s}
.vault-inner.show{opacity:1}
.code-display{display:flex;gap:8px;justify-content:center;margin:12px 0}
.code-digit{width:50px;height:60px;background:#2c3e50;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#f39c12;font-family:monospace;border:2px solid #f39c12}
.code-digit.filled{background:#f39c12;color:#2c3e50}
.calc-display{font-size:20px;font-weight:800;padding:12px;background:#F5F5F5;border-radius:12px;margin:10px 0;color:#333}
.input-area{display:flex;gap:8px;align-items:center;justify-content:center;margin:10px 0}
.answer-input{width:120px;padding:10px;border:3px solid #E0E0E0;border-radius:12px;font-size:20px;font-weight:700;text-align:center;outline:none}
.answer-input:focus{border-color:#f39c12}
.submit-btn{padding:10px 20px;background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
.submit-btn:hover{transform:scale(1.05)}
.fb{text-align:center;padding:10px;border-radius:12px;margin-top:10px;font-size:14px;font-weight:600;display:none}
.fb.show{display:block;animation:fadeIn .3s}
.fb.ok{background:#E8F5E9;color:#2E7D32}
.fb.no{background:#FFEBEE;color:#C62828}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.end-screen{color:#fff}
.end-screen h1{font-size:28px;margin-bottom:16px}
.fs{font-size:64px;font-weight:800;margin:16px 0;color:#f39c12}
.sd{font-size:48px;margin:16px 0}
.star{display:inline-block;color:#555;transition:all .5s}
.star.filled{color:#FFD700;animation:starPop .5s}
@keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sn{font-size:14px;opacity:0.7;margin-top:8px}
</style>
</head>
<body>
<div class="gc">
  <div class="screen start-screen active" id="ss">
    <h1>🔐 密码保险箱</h1>
    <p>小数加减法进位退位 · 四年级</p>
    <div class="vault-preview">🔐💰💎</div>
    <p style="font-size:13px;opacity:0.8;margin-bottom:20px">计算小数加减法（进位退位）<br>打开保险箱获得宝藏！共10关</p>
    <button class="btn" onclick="startGame()">开始破解 →</button>
  </div>
  <div class="screen" id="gs">
    <div class="gh">
      <span>第 <span id="rn">1</span>/10 关</span>
      <span>💰 <span id="sv">0</span>分</span>
    </div>
    <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
    <div class="ga">
      <div class="qb" id="qb">计算正确答案打开保险箱</div>
      <div class="vault">
        <div class="vault-door" id="vdoor">
          <div class="vault-dial" id="vdial">?</div>
          <div class="vault-handle"></div>
        </div>
        <div class="vault-inner" id="vinner">💎</div>
      </div>
      <div class="code-display" id="cd"></div>
      <div class="calc-display" id="calc"></div>
      <div class="input-area">
        <input type="number" class="answer-input" id="ansIn" step="0.1" placeholder="?">
        <button class="submit-btn" onclick="submit()">解锁</button>
      </div>
      <div class="fb" id="fb"></div>
    </div>
  </div>
  <div class="screen end-screen" id="es">
    <h1 id="et">🎉 全部破解！</h1>
    <div class="fs" id="fsc">0</div>
    <div class="sd" id="sd"></div>
    <p id="em" style="font-size:16px;margin-bottom:20px;opacity:0.9"></p>
    <p class="sn" id="snn"></p>
    <button class="btn" onclick="startGame()">再来一次 →</button>
  </div>
</div>
<script>
const P=new URLSearchParams(location.search);
const SN=P.get('student')||'';
const T=10;
let rd=0,sc=0,qs=[],ans=false;

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function genQ(){
  const r=[];
  for(let i=0;i<T;i++){
    const type=Math.random()<0.5?'add':'sub';
    let a,b,answer,expr;
    if(type==='add'){
      // With carry in tenths
      const intA=rand(1,20),intB=rand(1,20);
      const decA=rand(5,9),decB=rand(5,9);
      a=intA+decA/10;b=intB+decB/10;
      answer=Math.round((a+b)*10)/10;
      expr=`${a} + ${b}`;
    }else{
      // With borrow
      const intA=rand(5,30);
      const decA=rand(0,4);
      const intB=rand(1,intA);
      const decB=rand(decA+1,9);
      a=intA+decA/10;b=intB+decB/10;
      if(b>a){const t=a;a=b;b=t;}
      answer=Math.round((a-b)*10)/10;
      expr=`${a} - ${b}`;
    }
    r.push({a,b,answer,expr});
  }
  return r;
}

function startGame(){
  rd=0;sc=0;qs=genQ();
  show('ss',false);show('es',false);show('gs',true);
  next();
}

function show(id,v){document.getElementById(id).classList.toggle('active',v)}

function next(){
  if(rd>=T){end();return}
  ans=false;
  const q=qs[rd];
  document.getElementById('fb').className='fb';
  document.getElementById('rn').textContent=rd+1;
  document.getElementById('pb').style.width=(rd/T*100)+'%';
  document.getElementById('ansIn').value='';
  document.getElementById('vdoor').classList.remove('open');
  document.getElementById('vinner').classList.remove('show');
  document.getElementById('vdial').textContent='?';
  document.getElementById('calc').textContent=q.expr+' = ?';
  // Code display
  const ansStr=String(q.answer);
  const cd=document.getElementById('cd');
  cd.innerHTML='';
  ansStr.split('').forEach(c=>{
    const d=document.createElement('div');
    d.className='code-digit';
    d.textContent='?';
    cd.appendChild(d);
  });
}

function submit(){
  if(ans)return;
  const input=document.getElementById('ansIn');
  const val=parseFloat(input.value);
  if(isNaN(val)){input.style.borderColor='#f44336';return;}
  ans=true;
  const q=qs[rd];
  const fb=document.getElementById('fb');
  if(Math.abs(val-q.answer)<0.01){
    sc+=10;
    document.getElementById('sv').textContent=sc;
    fb.className='fb show ok';
    fb.textContent=`✅ 解锁成功！${q.expr} = ${q.answer}`;
    document.getElementById('vdoor').classList.add('open');
    document.getElementById('vinner').classList.add('show');
    document.getElementById('vdial').textContent=q.answer;
    // Reveal code
    const ansStr=String(q.answer);
    document.querySelectorAll('.code-digit').forEach((d,i)=>{
      setTimeout(()=>{d.textContent=ansStr[i]||'';d.classList.add('filled');},i*200);
    });
  }else{
    fb.className='fb show no';
    fb.textContent=`❌ 密码错误！正确答案是 ${q.answer}`;
    document.getElementById('vdial').textContent='✗';
  }
  setTimeout(()=>{rd++;next()},2500);
}

function end(){
  show('gs',false);show('es',true);
  document.getElementById('fsc').textContent=sc;
  const s=sc>=90?3:sc>=60?2:sc>=30?1:0;
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="star ${i<s?'filled':''}">★</span>`;
  document.getElementById('sd').innerHTML=h;
  document.getElementById('et').textContent=s>=3?'🏆 破解大师！':s>=2?'🎉 表现不错！':'💪 继续加油！';
  const m=['继续加油哦！','还不错，再努力一下！','很棒，你真厉害！','太优秀了，满分！'];
  document.getElementById('em').textContent=m[s];
  if(SN)document.getElementById('snn').textContent='玩家：'+SN;
}

document.getElementById('ansIn').addEventListener('keydown',e=>{if(e.key==='Enter')submit()});
</script>
</body>
</html>
