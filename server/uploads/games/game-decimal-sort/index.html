<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小数传送带 - 小数点移动</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC',sans-serif;background:linear-gradient(135deg,#434343 0%,#000000 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.gc{width:100%;max-width:480px;padding:16px}
.screen{display:none;text-align:center}
.screen.active{display:block}
.start-screen{color:#fff}
.start-screen h1{font-size:28px;text-shadow:2px 2px 4px rgba(0,0,0,0.3);margin-bottom:8px}
.start-screen p{font-size:15px;opacity:0.9;margin-bottom:20px}
.factory-preview{font-size:48px;margin:16px 0;animation:conveyorMove 2s linear infinite}
@keyframes conveyorMove{0%{transform:translateX(-10px)}50%{transform:translateX(10px)}100%{transform:translateX(-10px)}}
.btn{background:linear-gradient(135deg,#e67e22,#d35400);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.3);transition:transform .2s}
.btn:hover{transform:scale(1.05)}
.gh{display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:10px}
.gh span{background:rgba(255,255,255,0.15);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.pb{height:8px;background:rgba(255,255,255,0.15);border-radius:4px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#e67e22,#f39c12);border-radius:4px;transition:width .5s}
.ga{background:#fff;border-radius:24px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.15);min-height:420px}
.qb{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border-radius:16px;padding:14px;margin-bottom:14px;font-size:15px;font-weight:700;color:#E65100}
.conveyor{position:relative;height:120px;background:linear-gradient(180deg,#78909C,#546E7A);border-radius:16px;margin:12px 0;overflow:hidden;border:3px solid #455A64}
.conveyor-belt{position:absolute;bottom:20px;left:0;right:0;height:20px;background:repeating-linear-gradient(90deg,#37474F,#37474F 15px,#455A64 15px,#455A64 30px);animation:beltMove 2s linear infinite}
@keyframes beltMove{from{background-position-x:0}to{background-position-x:30px}}
.conveyor-rollers{position:absolute;bottom:10px;left:10%;right:10%;height:15px;display:flex;justify-content:space-between}
.roller{width:15px;height:15px;background:#90A4AE;border-radius:50%;border:2px solid #607D8B;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.number-box{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:#fff;padding:8px 20px;border-radius:12px;font-size:28px;font-weight:800;color:#333;box-shadow:0 4px 15px rgba(0,0,0,0.2);transition:all .5s;min-width:100px;text-align:center}
.number-box .decimal-point{color:#e74c3c;font-size:32px}
.target-box{position:absolute;top:20px;right:15px;background:linear-gradient(135deg,#4CAF50,#45a049);color:#fff;padding:8px 14px;border-radius:12px;font-size:16px;font-weight:700;box-shadow:0 4px 10px rgba(0,0,0,0.2)}
.arrow-btns{display:flex;gap:8px;justify-content:center;margin:12px 0}
.arrow-btn{width:60px;height:50px;border:none;border-radius:12px;font-size:20px;font-weight:700;cursor:pointer;transition:all .2s;color:#fff}
.arrow-btn.left{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.arrow-btn.right{background:linear-gradient(135deg,#2ecc71,#27ae60)}
.arrow-btn:hover{transform:scale(1.1)}
.arrow-btn:active{transform:scale(0.95)}
.arrow-btn:disabled{opacity:0.4;pointer-events:none}
.move-info{font-size:13px;color:#999;margin:8px 0;text-align:center}
.move-count{font-size:14px;font-weight:700;color:#E65100}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.opt{padding:12px;border:3px solid #E0E0E0;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;background:#fff}
.opt:hover{border-color:#e67e22;transform:scale(1.03)}
.opt.correct{border-color:#4CAF50;background:#E8F5E9;animation:pulse .5s}
.opt.wrong{border-color:#f44336;background:#FFEBEE;animation:shake .5s}
.opt.disabled{pointer-events:none;opacity:0.5}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fb{text-align:center;padding:10px;border-radius:12px;margin-top:10px;font-size:14px;font-weight:600;display:none}
.fb.show{display:block;animation:fadeIn .3s}
.fb.ok{background:#E8F5E9;color:#2E7D32}
.fb.no{background:#FFEBEE;color:#C62828}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.end-screen{color:#fff}
.end-screen h1{font-size:28px;margin-bottom:16px}
.fs{font-size:64px;font-weight:800;margin:16px 0;color:#e67e22}
.sd{font-size:48px;margin:16px 0}
.star{display:inline-block;color:#555;transition:all .5s}
.star.filled{color:#FFD700;animation:starPop .5s}
@keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sn{font-size:14px;opacity:0.7;margin-top:8px}
</style>
</head>
<body>
<div class="gc">
  <div class="screen start-screen active" id="ss">
    <h1>🏭 小数传送带</h1>
    <p>小数点移动 · 四年级</p>
    <div class="factory-preview">🏭⚙️📦</div>
    <p style="font-size:13px;opacity:0.8;margin-bottom:20px">移动小数点，让数字变成目标值<br>注意移动方向和位数！共10关</p>
    <button class="btn" onclick="startGame()">开工！ →</button>
  </div>
  <div class="screen" id="gs">
    <div class="gh">
      <span>第 <span id="rn">1</span>/10 关</span>
      <span>⭐ <span id="sv">0</span>分</span>
    </div>
    <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
    <div class="ga">
      <div class="qb" id="qb">移动小数点使数字等于目标值</div>
      <div class="conveyor">
        <div class="conveyor-belt"></div>
        <div class="conveyor-rollers">
          <div class="roller"></div><div class="roller"></div><div class="roller"></div><div class="roller"></div><div class="roller"></div>
        </div>
        <div class="number-box" id="nb"></div>
        <div class="target-box" id="tb">目标: ?</div>
      </div>
      <div class="arrow-btns">
        <button class="arrow-btn left" onclick="moveDP(-1)">← 左移</button>
        <button class="arrow-btn right" onclick="moveDP(1)">右移 →</button>
      </div>
      <div class="move-info">已移动: <span class="move-count" id="mc">0</span> 位</div>
      <div class="options" id="opts">
        <div class="opt" onclick="confirmAnswer()">✓ 确认答案</div>
        <div class="opt" onclick="resetRound()">↺ 重新开始</div>
      </div>
      <div class="fb" id="fb"></div>
    </div>
  </div>
  <div class="screen end-screen" id="es">
    <h1 id="et">🎉 下班了！</h1>
    <div class="fs" id="fsc">0</div>
    <div class="sd" id="sd"></div>
    <p id="em" style="font-size:16px;margin-bottom:20px;opacity:0.9"></p>
    <p class="sn" id="snn"></p>
    <button class="btn" onclick="startGame()">再来一次 →</button>
  </div>
</div>
<script>
const P=new URLSearchParams(location.search);
const SN=P.get('student')||'';
const T=10;
let rd=0,sc=0,qs=[],ans=false,dpPos=0,origDP=0,currentNum='';

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function genQ(){
  const r=[];
  for(let i=0;i<T;i++){
    const type=rand(0,2);
    let original,target,moves,dir;
    if(type===0){
      // Multiply by 10,100,1000 (move right)
      const mult=[10,100,1000][rand(0,2)];
      const base=rand(1,99)/10;
      original=base;
      target=base*mult;
      moves=Math.log10(mult);
      dir='right';
    }else if(type===1){
      // Divide by 10,100 (move left)
      const div=[10,100][rand(0,2)];
      const base=rand(1,999);
      original=base;
      target=base/div;
      moves=Math.log10(div);
      dir='left';
    }else{
      // Specific move
      const base=rand(1,50)/10;
      const shift=rand(1,3);
      if(Math.random()<0.5){
        original=base;target=base*Math.pow(10,shift);moves=shift;dir='right';
      }else{
        original=base*Math.pow(10,shift);target=base;moves=shift;dir='left';
      }
    }
    r.push({original,target,moves,dir});
  }
  return r;
}

function startGame(){
  rd=0;sc=0;qs=genQ();
  show('ss',false);show('es',false);show('gs',true);
  next();
}

function show(id,v){document.getElementById(id).classList.toggle('active',v)}

function formatNum(n){
  const s=String(n);
  const dp=s.indexOf('.');
  if(dp===-1)return s+'<span class="decimal-point">.</span>0';
  return s.substring(0,dp)+'<span class="decimal-point">.</span>'+s.substring(dp+1);
}

function next(){
  if(rd>=T){end();return}
  ans=false;
  const q=qs[rd];
  document.getElementById('fb').className='fb';
  document.getElementById('rn').textContent=rd+1;
  document.getElementById('pb').style.width=(rd/T*100)+'%';
  document.getElementById('qb').textContent=`移动小数点，把 ${q.original} 变成 ${q.target}`;
  document.getElementById('tb').textContent='目标: '+q.target;
  currentNum=String(q.original);
  dpPos=currentNum.indexOf('.');
  origDP=dpPos;
  document.getElementById('mc').textContent='0';
  updateDisplay();
}

function updateDisplay(){
  document.getElementById('nb').innerHTML=formatNum(parseFloat(currentNum));
}

function moveDP(dir){
  if(ans)return;
  const idx=currentNum.indexOf('.');
  if(dir===-1&&idx<=1)return; // Can't move left past first digit
  if(dir===1&&idx>=currentNum.length-1)return; // Can't move right past last digit
  const arr=currentNum.split('');
  arr.splice(idx,1);
  const newIdx=idx+dir;
  arr.splice(newIdx,0,'.');
  currentNum=arr.join('');
  const moved=Math.abs(newIdx-origDP);
  document.getElementById('mc').textContent=moved;
  updateDisplay();
  document.getElementById('nb').style.transform='scale(1.05)';
  setTimeout(()=>document.getElementById('nb').style.transform='',200);
}

function confirmAnswer(){
  if(ans)return;
  ans=true;
  const q=qs[rd];
  const fb=document.getElementById('fb');
  const current=parseFloat(currentNum);
  if(Math.abs(current-q.target)<0.001){
    sc+=10;
    document.getElementById('sv').textContent=sc;
    fb.className='fb show ok';
    fb.textContent=`✅ 正确！小数点向${q.dir==='right'?'右':'左'}移动了${q.moves}位`;
  }else{
    fb.className='fb show no';
    fb.textContent=`❌ 不对哦！应该向${q.dir==='right'?'右':'左'}移动${q.moves}位`;
  }
  setTimeout(()=>{rd++;next()},2000);
}

function resetRound(){
  if(ans)return;
  currentNum=String(qs[rd].original);
  dpPos=currentNum.indexOf('.');
  origDP=dpPos;
  document.getElementById('mc').textContent='0';
  updateDisplay();
}

function end(){
  show('gs',false);show('es',true);
  document.getElementById('fsc').textContent=sc;
  const s=sc>=90?3:sc>=60?2:sc>=30?1:0;
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="star ${i<s?'filled':''}">★</span>`;
  document.getElementById('sd').innerHTML=h;
  document.getElementById('et').textContent=s>=3?'🏆 工厂之星！':s>=2?'🎉 表现不错！':'💪 继续加油！';
  const m=['继续加油哦！','还不错，再努力一下！','很棒，你真厉害！','太优秀了，满分！'];
  document.getElementById('em').textContent=m[s];
  if(SN)document.getElementById('snn').textContent='玩家：'+SN;
}
</script>
</body>
</html>
