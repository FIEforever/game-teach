<style>

.bubble-field{position:relative;height:200px;background:linear-gradient(180deg,#E0F7FA,#B2EBF2);border-radius:16px;margin:12px 0;overflow:hidden}
.bubble{position:absolute;width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:all .3s;text-align:center;line-height:1.2;padding:4px;color:#fff;animation:bubbleRise 3s ease-in-out infinite}

<body>
<div class="gc">
  <div class="screen start-screen active" id="ss">
    <h1>ًں«§ هˆ†é…چه¾‹و³،و³،</h1>
    <p>ن¹کو³•هˆ†é…چه¾‹ آ· ه››ه¹´ç؛§</p>
    <div class="bubble-preview">ًں«§ًں«§ًں«§</div>
    <p style="font-size:13px;opacity:0.8;margin-bottom:20px">ه°„ه‡؛و­£ç،®çڑ„و³،و³،<br>è؟گç”¨ن¹کو³•هˆ†é…چه¾‹ï¼په…±10ه…³</p>
    <button class="btn" onclick="startGame()">ه¼€ه§‹ه°„ه‡» â†’</button>
  </div>
  <div class="screen" id="gs">
    <div class="gh">
      <span>ç¬¬ <span id="rn">1</span>/10 ه…³</span>
      <span>â­گ <span id="sv">0</span>هˆ†</span>
    </div>
    <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
    <div class="ga">
      <div class="qb" id="qb">ç‚¹ه‡»و­£ç،®çڑ„و³،و³،ï¼پ</div>
      <div class="target-display" id="td"></div>
      <div class="bubble-field" id="bf">
        <div class="shooter">ًںژ¯</div>
      </div>
      <div class="hint" id="hint"></div>
      <div class="fb" id="fb"></div>
    </div>
  </div>
  <div class="screen end-screen" id="es">
    <h1 id="et">ًںژ‰ ه°„ه‡»ç»“و‌ںï¼پ</h1>
    <div class="fs" id="fsc">0</div>
    <div class="sd" id="sd"></div>
    <p id="em" style="font-size:16px;margin-bottom:20px;opacity:0.9"></p>
    <p class="sn" id="snn"></p>
    <button class="btn" onclick="startGame()">ه†چو‌¥ن¸€و¬، â†’</button>
  </div>
</div>
<script>
const P=new URLSearchParams(location.search);
const SN=P.get('student')||'';
const T=10;
let rd=0,sc=0,qs=[],ans=false;

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function genQ(){
  const r=[];
  for(let i=0;i<T;i++){
    const type=rand(0,2);
    let question,correct,wrongs,explanation;
    const a=rand(2,9),b=rand(10,30),c=rand(10,30);
    if(type===0){
      // aأ—(b+c) = aأ—b + aأ—c
      const result=a*(b+c);
      correct=`${a}أ—${b} + ${a}أ—${c}`;
      wrongs=[
        `${a}أ—${b} - ${a}أ—${c}`,
        `${a}أ—${b} أ— ${a}أ—${c}`,
        `${a}+${b} أ— ${a}+${c}`
      ];
      question=`${a} أ— (${b} + ${c}) = ?`;
      explanation=`${a}أ—(${b}+${c}) = ${a}أ—${b} + ${a}أ—${c} = ${a*b}+${a*c} = ${result}`;
    }else if(type===1){
      // aأ—(b-c) = aأ—b - aأ—c
      const big=Math.max(b,c),small=Math.min(b,c);
      const result=a*(big-small);
      correct=`${a}أ—${big} - ${a}أ—${small}`;
      wrongs=[
        `${a}أ—${big} + ${a}أ—${small}`,
        `${a}أ—(${big}+${small})`,
        `${a}أ—${small} - ${a}أ—${big}`
      ];
      question=`${a} أ— (${big} - ${small}) = ?`;
      explanation=`${a}أ—(${big}-${small}) = ${a}أ—${big} - ${a}أ—${small} = ${a*big}-${a*small} = ${result}`;
    }else{
      // aأ—b + aأ—c = aأ—(b+c)
      const result=a*(b+c);
      correct=`${a} أ— (${b} + ${c})`;
      wrongs=[
        `${a} أ— (${b} - ${c})`,
        `(${a} + ${b}) أ— ${c}`,
        `${a} أ— ${b} أ— ${c}`
      ];
      question=`${a}أ—${b} + ${a}أ—${c} = ?`;
      explanation=`${a}أ—${b} + ${a}أ—${c} = ${a}أ—(${b}+${c}) = ${a}أ—${b+c} = ${result}`;
    }
    r.push({question,correct,wrongs,explanation});
  }
  return r;
}

function startGame(){
  rd=0;sc=0;qs=genQ();
  show('ss',false);show('es',false);show('gs',true);
  next();
}

function show(id,v){document.getElementById(id).classList.toggle('active',v)}

function next(){
  if(rd>=T){end();return}
  ans=false;
  const q=qs[rd];
  document.getElementById('fb').className='fb';
  document.getElementById('qb').textContent='ç‚¹ه‡»ن¸ژن¸‹é‌¢ç­‰ه¼ڈç›¸ç­‰çڑ„و³،و³،ï¼پ';
  document.getElementById('td').textContent=q.question;
  document.getElementById('hint').textContent='ًں’، وڈگç¤؛ï¼ڑن¹کو³•هˆ†é…چه¾‹ aأ—(b+c) = aأ—b + aأ—c';
  document.getElementById('rn').textContent=rd+1;
  document.getElementById('pb').style.width=(rd/T*100)+'%';
  // Create bubbles
  const bf=document.getElementById('bf');
  bf.querySelectorAll('.bubble').forEach(b=>b.remove());
  const allOptions=[q.correct,...q.wrongs].sort(()=>Math.random()-0.5);
  const colors=['#e74c3c','#3498db','#2ecc71','#f39c12'];
  allOptions.forEach((opt,idx)=>{
    const bubble=document.createElement('div');
    bubble.className='bubble';
    bubble.textContent=opt;
    bubble.style.background=colors[idx%colors.length];
    bubble.style.left=rand(5,70)+'%';
    bubble.style.top=rand(5,60)+'%';
    bubble.style.animationDelay=(idx*0.5)+'s';
    bubble.onclick=()=>shootBubble(bubble,opt,q);
    bf.insertBefore(bubble,bf.querySelector('.shooter'));
  });
}

function shootBubble(bubble,val,q){
  if(ans)return;
  ans=true;
  const fb=document.getElementById('fb');
  if(val===q.correct){
    sc+=10;
    document.getElementById('sv').textContent=sc;
    bubble.classList.add('pop','correct-bubble');
    fb.className='fb show ok';
    fb.textContent='âœ… و­£ç،®ï¼پ'+q.explanation;
  }else{
    bubble.classList.add('wrong-bubble');
    fb.className='fb show no';
    fb.textContent='â‌Œ ن¸چه¯¹ه“¦ï¼پو­£ç،®ç­”و،ˆوک¯ '+q.correct;
  }
  setTimeout(()=>{rd++;next()},2200);
}

function end(){
  show('gs',false);show('es',true);
  document.getElementById('fsc').textContent=sc;
  const s=sc>=90?3:sc>=60?2:sc>=30?1:0;
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="star ${i<s?'filled':''}">âک…</span>`;
  document.getElementById('sd').innerHTML=h;
  document.getElementById('et').textContent=s>=3?'ًںڈ† و³،و³،ه¤§ه¸ˆï¼پ':s>=2?'ًںژ‰ è،¨çژ°ن¸چé”™ï¼پ':'ًں’ھ ç»§ç»­هٹ و²¹ï¼پ';
  const m=['ç»§ç»­هٹ و²¹ه“¦ï¼پ','è؟کن¸چé”™ï¼Œه†چهٹھهٹ›ن¸€ن¸‹ï¼پ','ه¾ˆو£’ï¼Œن½ çœںهژ‰ه®³ï¼پ','ه¤ھن¼کç§€ن؛†ï¼Œو»،هˆ†ï¼پ'];
  document.getElementById('em').textContent=m[s];
  if(SN)document.getElementById('snn').textContent='çژ©ه®¶ï¼ڑ'+SN;
}
</script>
