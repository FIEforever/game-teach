<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四舍五入钓鱼 - 近似数</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC',sans-serif;background:linear-gradient(180deg,#0077b6 0%,#023e8a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.gc{width:100%;max-width:480px;padding:16px}
.screen{display:none;text-align:center}
.screen.active{display:block}
.start-screen{color:#fff}
.start-screen h1{font-size:28px;text-shadow:2px 2px 4px rgba(0,0,0,0.3);margin-bottom:8px}
.start-screen p{font-size:15px;opacity:0.9;margin-bottom:20px}
.fish-preview{font-size:48px;margin:16px 0;animation:swim 3s ease-in-out infinite}
@keyframes swim{0%,100%{transform:translateX(0) scaleX(1)}25%{transform:translateX(15px) scaleX(1)}50%{transform:translateX(0) scaleX(-1)}75%{transform:translateX(-15px) scaleX(-1)}}
.btn{background:linear-gradient(135deg,#00b4d8,#0077b6);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.2);transition:transform .2s}
.btn:hover{transform:scale(1.05)}
.gh{display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:10px}
.gh span{background:rgba(255,255,255,0.2);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.pb{height:8px;background:rgba(255,255,255,0.2);border-radius:4px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:#fff;border-radius:4px;transition:width .5s}
.ga{background:#fff;border-radius:24px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.15);min-height:420px}
.qb{background:linear-gradient(135deg,#E0F7FA,#B2EBF2);border-radius:16px;padding:14px;margin-bottom:14px;font-size:15px;font-weight:700;color:#006064}
.underwater{position:relative;height:180px;background:linear-gradient(180deg,#48cae4 0%,#0096c7 50%,#023e8a 100%);border-radius:16px;margin:12px 0;overflow:hidden}
.water-surface{position:absolute;top:0;left:0;right:0;height:20px;background:repeating-linear-gradient(90deg,transparent,transparent 20px,rgba(255,255,255,0.1) 20px,rgba(255,255,255,0.1) 22px);animation:wave 3s linear infinite}
@keyframes wave{from{transform:translateX(0)}to{transform:translateX(22px)}}
.bubble{position:absolute;width:8px;height:8px;background:rgba(255,255,255,0.4);border-radius:50%;animation:rise 3s ease-in infinite}
@keyframes rise{from{transform:translateY(0);opacity:0.6}to{transform:translateY(-100px);opacity:0}}
.fish{position:absolute;font-size:36px;cursor:pointer;transition:all .3s;animation:fishSwim 4s ease-in-out infinite}
.fish:hover{transform:scale(1.2)!important}
.fish.caught{animation:fishCaught .5s forwards}
@keyframes fishSwim{0%,100%{transform:translateX(0) translateY(0)}25%{transform:translateX(10px) translateY(-5px)}50%{transform:translateX(0) translateY(5px)}75%{transform:translateX(-10px) translateY(-5px)}}
@keyframes fishCaught{from{transform:translateY(0) scale(1)}to{transform:translateY(-50px) scale(0.5);opacity:0}}
.fish.correct-fish{filter:drop-shadow(0 0 10px #4CAF50)}
.fish.wrong-fish{animation:shake .5s}
.fish-label{position:absolute;top:-25px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.9);padding:2px 8px;border-radius:8px;font-size:12px;font-weight:700;color:#333;white-space:nowrap}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.hook{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:24px;z-index:2}
.hook-line{position:absolute;top:0;left:50%;width:2px;height:40px;background:#888;transform:translateX(-50%)}
.fb{text-align:center;padding:10px;border-radius:12px;margin-top:10px;font-size:14px;font-weight:600;display:none}
.fb.show{display:block;animation:fadeIn .3s}
.fb.ok{background:#E8F5E9;color:#2E7D32}
.fb.no{background:#FFEBEE;color:#C62828}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.hint{font-size:12px;color:#999;margin-top:8px}
.end-screen{color:#fff}
.end-screen h1{font-size:28px;margin-bottom:16px}
.fs{font-size:64px;font-weight:800;margin:16px 0}
.sd{font-size:48px;margin:16px 0}
.star{display:inline-block;color:#555;transition:all .5s}
.star.filled{color:#FFD700;animation:starPop .5s}
@keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sn{font-size:14px;opacity:0.7;margin-top:8px}
</style>
</head>
<body>
<div class="gc">
  <div class="screen start-screen active" id="ss">
    <h1>🐟 四舍五入钓鱼</h1>
    <p>近似数 · 四年级</p>
    <div class="fish-preview">🐟🎣🐠</div>
    <p style="font-size:13px;opacity:0.8;margin-bottom:20px">钓出正确四舍五入的鱼<br>注意看清楚要求！共10关</p>
    <button class="btn" onclick="startGame()">开始钓鱼 →</button>
  </div>
  <div class="screen" id="gs">
    <div class="gh">
      <span>第 <span id="rn">1</span>/10 关</span>
      <span>⭐ <span id="sv">0</span>分</span>
    </div>
    <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
    <div class="ga">
      <div class="qb" id="qb">把数字四舍五入到指定位置</div>
      <div class="underwater" id="uw">
        <div class="water-surface"></div>
        <div class="hook-line"></div>
        <div class="hook">🪝</div>
      </div>
      <div class="hint" id="hint"></div>
      <div class="fb" id="fb"></div>
    </div>
  </div>
  <div class="screen end-screen" id="es">
    <h1 id="et">🎉 钓鱼结束！</h1>
    <div class="fs" id="fsc">0</div>
    <div class="sd" id="sd"></div>
    <p id="em" style="font-size:16px;margin-bottom:20px;opacity:0.9"></p>
    <p class="sn" id="snn"></p>
    <button class="btn" onclick="startGame()">再来一次 →</button>
  </div>
</div>
<script>
const P=new URLSearchParams(location.search);
const SN=P.get('student')||'';
const T=10;
let rd=0,sc=0,qs=[],ans=false;

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function genQ(){
  const r=[];
  for(let i=0;i<T;i++){
    const type=rand(0,2);
    let number,place,correct,question;
    if(type===0){
      // Round to integer
      const intP=rand(1,99);
      const decP=rand(1,99);
      number=intP+decP/100;
      place='整数';
      correct=Math.round(number);
      question=`把 ${number} 四舍五入到整数`;
    }else if(type===1){
      // Round to tenths
      const intP=rand(1,50);
      const decP=rand(11,99);
      number=intP+decP/100;
      place='十分位';
      correct=Math.round(number*10)/10;
      question=`把 ${number} 四舍五入到十分位`;
    }else{
      // Round to specific digit
      const intP=rand(1,999);
      const decP=rand(1,9);
      number=intP+decP/10;
      place='整数（个位）';
      correct=Math.round(number);
      question=`把 ${number} 四舍五入到个位`;
    }
    const wrongs=generateWrongs(correct,place);
    r.push({number,place,correct,question,options:[correct,...wrongs].sort(()=>Math.random()-0.5)});
  }
  return r;
}

function generateWrongs(correct,place){
  const wrongs=new Set();
  while(wrongs.size<3){
    const off=rand(1,3)*(Math.random()<0.5?1:-1);
    const w=correct+off;
    if(w!==correct&&w>=0)wrongs.add(w);
  }
  return [...wrongs].slice(0,3);
}

function startGame(){
  rd=0;sc=0;qs=genQ();
  show('ss',false);show('es',false);show('gs',true);
  next();
}

function show(id,v){document.getElementById(id).classList.toggle('active',v)}

function next(){
  if(rd>=T){end();return}
  ans=false;
  const q=qs[rd];
  document.getElementById('fb').className='fb';
  document.getElementById('rn').textContent=rd+1;
  document.getElementById('pb').style.width=(rd/T*100)+'%';
  document.getElementById('qb').textContent=q.question;
  document.getElementById('hint').textContent=`💡 四舍五入到${q.place}，看下一位是>=5还是<5`;
  // Clear old fish
  const uw=document.getElementById('uw');
  uw.querySelectorAll('.fish,.bubble').forEach(f=>f.remove());
  // Add bubbles
  for(let i=0;i<5;i++){
    const b=document.createElement('div');
    b.className='bubble';
    b.style.left=rand(10,90)+'%';
    b.style.bottom=rand(5,30)+'%';
    b.style.animationDelay=(i*0.5)+'s';
    uw.appendChild(b);
  }
  // Add fish
  const fishEmojis=['🐟','🐠','🐡','🦈','🐬'];
  q.options.forEach((opt,idx)=>{
    const f=document.createElement('div');
    f.className='fish';
    f.style.left=(10+idx*22)+'%';
    f.style.top=(40+rand(0,40))+'%';
    f.style.animationDelay=(idx*0.8)+'s';
    f.innerHTML=`<span class="fish-label">${opt}</span>${fishEmojis[idx%fishEmojis.length]}`;
    f.onclick=()=>catchFish(f,opt,q);
    uw.appendChild(f);
  });
}

function catchFish(fish,val,q){
  if(ans)return;
  ans=true;
  const fb=document.getElementById('fb');
  if(val===q.correct){
    sc+=10;
    document.getElementById('sv').textContent=sc;
    fish.classList.add('caught','correct-fish');
    fb.className='fb show ok';
    fb.textContent=`✅ 钓到了！${q.number} 四舍五入到${q.place}是 ${q.correct}`;
  }else{
    fish.classList.add('wrong-fish');
    fb.className='fb show no';
    fb.textContent=`❌ 跑掉了！正确答案是 ${q.correct}`;
  }
  setTimeout(()=>{rd++;next()},2000);
}

function end(){
  show('gs',false);show('es',true);
  document.getElementById('fsc').textContent=sc;
  const s=sc>=90?3:sc>=60?2:sc>=30?1:0;
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="star ${i<s?'filled':''}">★</span>`;
  document.getElementById('sd').innerHTML=h;
  document.getElementById('et').textContent=s>=3?'🏆 钓鱼大师！':s>=2?'🎉 表现不错！':'💪 继续加油！';
  const m=['继续加油哦！','还不错，再努力一下！','很棒，你真厉害！','太优秀了，满分！'];
  document.getElementById('em').textContent=m[s];
  if(SN)document.getElementById('snn').textContent='玩家：'+SN;
}
</script>
</body>
</html>
