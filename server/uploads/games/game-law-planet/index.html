<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>定律星球 - 加法交换律结合律</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC',sans-serif;background:linear-gradient(135deg,#0c0c1d 0%,#1a1a3e 50%,#2d1b69 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.gc{width:100%;max-width:480px;padding:16px}
.screen{display:none;text-align:center}
.screen.active{display:block}
.start-screen{color:#fff}
.start-screen h1{font-size:28px;text-shadow:0 0 20px rgba(147,112,219,0.5);margin-bottom:8px}
.start-screen p{font-size:15px;opacity:0.9;margin-bottom:20px}
.space-preview{font-size:48px;margin:16px 0;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.stars-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star-dot{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:twinkle 2s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.3}50%{opacity:1}}
.btn{background:linear-gradient(135deg,#9b59b6,#8e44ad);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.3);transition:transform .2s;position:relative;z-index:1}
.btn:hover{transform:scale(1.05)}
.gh{display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:10px;position:relative;z-index:1}
.gh span{background:rgba(255,255,255,0.15);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.pb{height:8px;background:rgba(255,255,255,0.15);border-radius:4px;margin-bottom:14px;overflow:hidden;position:relative;z-index:1}
.pf{height:100%;background:linear-gradient(90deg,#9b59b6,#3498db);border-radius:4px;transition:width .5s}
.ga{background:rgba(255,255,255,0.05);border:2px solid rgba(147,112,219,0.3);border-radius:24px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.3);min-height:400px;color:#fff;position:relative;z-index:1}
.qb{background:rgba(147,112,219,0.2);border:1px solid rgba(147,112,219,0.4);border-radius:16px;padding:14px;margin-bottom:14px;font-size:16px;font-weight:700;color:#D7BDE2}
.planet-area{display:flex;justify-content:center;align-items:center;gap:16px;margin:16px 0;flex-wrap:wrap;min-height:80px}
.planet{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;cursor:pointer;transition:all .3s;position:relative}
.planet::after{content:'';position:absolute;top:-4px;left:-4px;right:-4px;bottom:-4px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);animation:orbit 3s linear infinite}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.planet:hover{transform:scale(1.15)}
.planet.selected{box-shadow:0 0 20px rgba(255,255,255,0.5);transform:scale(1.15)}
.planet.p1{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.planet.p2{background:linear-gradient(135deg,#3498db,#2980b9)}
.planet.p3{background:linear-gradient(135deg,#2ecc71,#27ae60)}
.planet.p4{background:linear-gradient(135deg,#f39c12,#e67e22)}
.swap-btn{font-size:28px;cursor:pointer;transition:all .3s;padding:8px}
.swap-btn:hover{transform:scale(1.2) rotate(180deg)}
.equation-display{font-size:28px;font-weight:800;margin:16px 0;padding:12px;background:rgba(0,0,0,0.3);border-radius:12px;letter-spacing:2px}
.equation-display .op{color:#f39c12}
.equation-display .eq-sign{color:#2ecc71}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.choice{padding:14px;border:2px solid rgba(255,255,255,0.2);border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;background:rgba(255,255,255,0.05)}
.choice:hover{border-color:#9b59b6;transform:scale(1.03);background:rgba(147,112,219,0.15)}
.choice.correct{border-color:#2ecc71;background:rgba(46,204,113,0.2);animation:pulse .5s}
.choice.wrong{border-color:#e74c3c;background:rgba(231,76,60,0.2);animation:shake .5s}
.choice.disabled{pointer-events:none;opacity:0.5}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fb{text-align:center;padding:10px;border-radius:12px;margin-top:10px;font-size:14px;font-weight:600;display:none}
.fb.show{display:block;animation:fadeIn .3s}
.fb.ok{background:rgba(46,204,113,0.2);color:#2ecc71;border:1px solid rgba(46,204,113,0.3)}
.fb.no{background:rgba(231,76,60,0.2);color:#e74c3c;border:1px solid rgba(231,76,60,0.3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.end-screen{color:#fff;position:relative;z-index:1}
.end-screen h1{font-size:28px;margin-bottom:16px}
.fs{font-size:64px;font-weight:800;margin:16px 0;color:#9b59b6}
.sd{font-size:48px;margin:16px 0}
.star{display:inline-block;color:#333;transition:all .5s}
.star.filled{color:#FFD700;animation:starPop .5s}
@keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sn{font-size:14px;opacity:0.7;margin-top:8px}
</style>
</head>
<body>
<div class="stars-bg" id="starsBg"></div>
<div class="gc">
  <div class="screen start-screen active" id="ss">
    <h1>🪐 定律星球</h1>
    <p>加法交换律和结合律 · 四年级</p>
    <div class="space-preview">🪐⭐🌌</div>
    <p style="font-size:13px;opacity:0.7;margin-bottom:20px">交换星球的位置，或者重新组合<br>探索加法定律的奥秘！共10关</p>
    <button class="btn" onclick="startGame()">开始探索 →</button>
  </div>
  <div class="screen" id="gs">
    <div class="gh">
      <span>第 <span id="rn">1</span>/10 关</span>
      <span>⭐ <span id="sv">0</span>分</span>
    </div>
    <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
    <div class="ga">
      <div class="qb" id="qb">交换两个星球的位置，使等式成立</div>
      <div class="planet-area" id="pa"></div>
      <div class="equation-display" id="ed"></div>
      <div class="choices" id="ch"></div>
      <div class="fb" id="fb"></div>
    </div>
  </div>
  <div class="screen end-screen" id="es">
    <h1 id="et">🎉 探索完成！</h1>
    <div class="fs" id="fsc">0</div>
    <div class="sd" id="sd"></div>
    <p id="em" style="font-size:16px;margin-bottom:20px;opacity:0.9"></p>
    <p class="sn" id="snn"></p>
    <button class="btn" onclick="startGame()">再来一次 →</button>
  </div>
</div>
<script>
// Create stars background
const sb=document.getElementById('starsBg');
for(let i=0;i<50;i++){
  const s=document.createElement('div');
  s.className='star-dot';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.animationDelay=Math.random()*2+'s';
  s.style.width=s.style.height=rand(1,4)+'px';
  sb.appendChild(s);
}

const P=new URLSearchParams(location.search);
const SN=P.get('student')||'';
const T=10;
let rd=0,sc=0,qs=[],ans=false;

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function genQ(){
  const r=[];
  for(let i=0;i<T;i++){
    if(Math.random()<0.5){
      // Commutative: a+b = b+a
      const a=rand(10,50),b=rand(10,50);
      const c=rand(10,50);
      const type=Math.random()<0.5?'commute':'associate';
      if(type==='commute'){
        const correct=`${b} + ${a} + ${c}`;
        const wrongs=[`${a} + ${c} + ${b}`,`${c} + ${a} + ${b}`,`${a} + ${b} + ${c}`];
        r.push({
          type:'交换律',
          question:`交换星球位置，使计算更简便：`,
          original:`${a} + ${b} + ${c}`,
          target:`${a} + ${c} + ${b}`,
          nums:[a,b,c],
          correct,
          options:[correct,...wrongs].sort(()=>Math.random()-0.5),
          hint:`${a}+${c}=${a+c}，再加${b}更方便`
        });
      }else{
        const correct=`(${a} + ${b}) + ${c}`;
        const wrongs=[`${a} + (${b} + ${c})`,`(${a} + ${c}) + ${b}`,`${a} + ${b} - ${c}`];
        r.push({
          type:'结合律',
          question:`用括号组合星球，使计算更简便：`,
          original:`${a} + ${b} + ${c}`,
          target:correct,
          nums:[a,b,c],
          correct,
          options:[correct,...wrongs].sort(()=>Math.random()-0.5),
          hint:`先算${a}+${b}=${a+b}，再加${c}`
        });
      }
    }else{
      const a=rand(20,80),b=rand(10,30),c=rand(10,30);
      if(a+b+c===b+a+c){
        const correct=`${b} + ${a} + ${c}`;
        const wrongs=[`${a} + ${c} + ${b}`,`${c} + ${b} + ${a}`,`${b} + ${c} + ${a}`];
        r.push({
          type:'交换律',
          question:`利用交换律重新排列：`,
          original:`${a} + ${b} + ${c}`,
          target:correct,
          nums:[a,b,c],
          correct,
          options:[correct,...wrongs].sort(()=>Math.random()-0.5),
          hint:`交换${a}和${b}的位置`
        });
      }
    }
  }
  return r;
}

function startGame(){
  rd=0;sc=0;qs=genQ();
  show('ss',false);show('es',false);show('gs',true);
  next();
}

function show(id,v){document.getElementById(id).classList.toggle('active',v)}

function next(){
  if(rd>=T){end();return}
  ans=false;
  const q=qs[rd];
  document.getElementById('fb').className='fb';
  document.getElementById('qb').textContent=q.question;
  document.getElementById('rn').textContent=rd+1;
  document.getElementById('pb').style.width=(rd/T*100)+'%';
  // Render planets
  const pa=document.getElementById('pa');
  pa.innerHTML='';
  const colors=['p1','p2','p3','p4'];
  q.nums.forEach((n,i)=>{
    const p=document.createElement('div');
    p.className=`planet ${colors[i%4]}`;
    p.textContent=n;
    p.style.animationDelay=i*0.2+'s';
    pa.appendChild(p);
    if(i<q.nums.length-1){
      const op=document.createElement('span');
      op.textContent='+';
      op.style.fontSize='24px';
      op.style.color='#D7BDE2';
      pa.appendChild(op);
    }
  });
  // Render equation
  document.getElementById('ed').innerHTML=`<span>${q.original}</span> <span class="eq-sign">=</span> <span class="op">?</span>`;
  // Render choices
  const ch=document.getElementById('ch');
  ch.innerHTML='';
  q.options.forEach(opt=>{
    const c=document.createElement('div');
    c.className='choice';
    c.textContent=opt;
    c.onclick=()=>pickAnswer(opt,c);
    ch.appendChild(c);
  });
}

function pickAnswer(val,el){
  if(ans)return;
  ans=true;
  const q=qs[rd];
  const fb=document.getElementById('fb');
  document.querySelectorAll('.choice').forEach(c=>c.classList.add('disabled'));
  if(val===q.correct){
    sc+=10;
    document.getElementById('sv').textContent=sc;
    el.classList.add('correct');
    fb.className='fb show ok';
    fb.textContent='✅ 正确！'+q.hint;
    document.getElementById('ed').innerHTML=`<span>${q.original}</span> <span class="eq-sign">=</span> <span class="op">${q.correct}</span>`;
  }else{
    el.classList.add('wrong');
    fb.className='fb show no';
    fb.textContent='❌ 正确答案是 '+q.correct+'。'+q.hint;
  }
  setTimeout(()=>{rd++;next()},2000);
}

function end(){
  show('gs',false);show('es',true);
  document.getElementById('fsc').textContent=sc;
  const s=sc>=90?3:sc>=60?2:sc>=30?1:0;
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="star ${i<s?'filled':''}">★</span>`;
  document.getElementById('sd').innerHTML=h;
  document.getElementById('et').textContent=s>=3?'🏆 星际大师！':s>=2?'🎉 表现不错！':'💪 继续加油！';
  const m=['继续加油哦！','还不错，再努力一下！','很棒，你真厉害！','太优秀了，满分！'];
  document.getElementById('em').textContent=m[s];
  if(SN)document.getElementById('snn').textContent='玩家：'+SN;
}
</script>
</body>
</html>
