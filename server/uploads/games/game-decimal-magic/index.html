<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小数魔术 - 小数的性质</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC',sans-serif;background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.gc{width:100%;max-width:480px;padding:16px}
.screen{display:none;text-align:center}
.screen.active{display:block}
.start-screen{color:#fff}
.start-screen h1{font-size:28px;text-shadow:0 0 20px rgba(147,112,219,0.5);margin-bottom:8px}
.start-screen p{font-size:15px;opacity:0.9;margin-bottom:20px}
.magic-preview{font-size:48px;margin:16px 0;animation:magicWand 2s ease-in-out infinite}
@keyframes magicWand{0%,100%{transform:rotate(0deg) scale(1)}25%{transform:rotate(-15deg) scale(1.1)}75%{transform:rotate(15deg) scale(1.1)}}
.btn{background:linear-gradient(135deg,#9b59b6,#8e44ad);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.3);transition:transform .2s}
.btn:hover{transform:scale(1.05)}
.gh{display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:10px}
.gh span{background:rgba(255,255,255,0.15);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.pb{height:8px;background:rgba(255,255,255,0.15);border-radius:4px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#9b59b6,#e74c3c);border-radius:4px;transition:width .5s}
.ga{background:rgba(255,255,255,0.05);border:2px solid rgba(147,112,219,0.3);border-radius:24px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.3);min-height:420px;color:#fff}
.qb{background:rgba(147,112,219,0.2);border:1px solid rgba(147,112,219,0.4);border-radius:16px;padding:14px;margin-bottom:14px;font-size:15px;font-weight:700;color:#D7BDE2}
.stage{position:relative;width:100%;height:180px;background:linear-gradient(180deg,#1a1a3e,#2d1b69);border-radius:16px;margin:12px 0;overflow:hidden;border:2px solid rgba(147,112,219,0.3)}
.stage::before{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(180deg,transparent,#3d2b79)}
.curtain-left,.curtain-right{position:absolute;top:0;width:20%;height:100%;background:linear-gradient(90deg,#8e44ad,#9b59b6);z-index:1}
.curtain-left{left:0;border-radius:16px 0 0 16px}
.curtain-right{right:0;border-radius:0 16px 16px 0}
.magic-object{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;transition:all .5s;z-index:2}
.magic-object.transform{animation:magicTransform 1s}
@keyframes magicTransform{0%{transform:translate(-50%,-50%) scale(1) rotate(0deg)}50%{transform:translate(-50%,-50%) scale(1.5) rotate(180deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(360deg)}}
.sparkle{position:absolute;width:8px;height:8px;background:#FFD700;border-radius:50%;animation:sparkle 1s ease-out forwards;z-index:3}
@keyframes sparkle{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0) translate(var(--tx),var(--ty))}}
.equation-show{font-size:28px;font-weight:800;margin:12px 0;padding:12px;background:rgba(0,0,0,0.3);border-radius:12px;letter-spacing:2px}
.equation-show .highlight{color:#f39c12}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.choice{padding:12px;border:2px solid rgba(255,255,255,0.2);border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;background:rgba(255,255,255,0.05)}
.choice:hover{border-color:#9b59b6;transform:scale(1.03)}
.choice.correct{border-color:#2ecc71;background:rgba(46,204,113,0.2);animation:pulse .5s}
.choice.wrong{border-color:#e74c3c;background:rgba(231,76,60,0.2);animation:shake .5s}
.choice.disabled{pointer-events:none;opacity:0.5}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fb{text-align:center;padding:10px;border-radius:12px;margin-top:10px;font-size:14px;font-weight:600;display:none}
.fb.show{display:block;animation:fadeIn .3s}
.fb.ok{background:rgba(46,204,113,0.2);color:#2ecc71;border:1px solid rgba(46,204,113,0.3)}
.fb.no{background:rgba(231,76,60,0.2);color:#e74c3c;border:1px solid rgba(231,76,60,0.3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.end-screen{color:#fff}
.end-screen h1{font-size:28px;margin-bottom:16px}
.fs{font-size:64px;font-weight:800;margin:16px 0;color:#9b59b6}
.sd{font-size:48px;margin:16px 0}
.star{display:inline-block;color:#333;transition:all .5s}
.star.filled{color:#FFD700;animation:starPop .5s}
@keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sn{font-size:14px;opacity:0.7;margin-top:8px}
</style>
</head>
<body>
<div class="gc">
  <div class="screen start-screen active" id="ss">
    <h1>🎩 小数魔术</h1>
    <p>小数的性质 · 四年级</p>
    <div class="magic-preview">🎩✨🐰</div>
    <p style="font-size:13px;opacity:0.7;margin-bottom:20px">小数末尾添上0或去掉0<br>小数的大小不变！共10关</p>
    <button class="btn" onclick="startGame()">开始表演 →</button>
  </div>
  <div class="screen" id="gs">
    <div class="gh">
      <span>第 <span id="rn">1</span>/10 关</span>
      <span>⭐ <span id="sv">0</span>分</span>
    </div>
    <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
    <div class="ga">
      <div class="qb" id="qb">判断下面两个小数是否相等</div>
      <div class="stage" id="stage">
        <div class="curtain-left"></div>
        <div class="curtain-right"></div>
        <div class="magic-object" id="mo">🎩</div>
      </div>
      <div class="equation-show" id="eq"></div>
      <div class="choices">
        <div class="choice" id="c1" onclick="answer(true)">✅ 相等</div>
        <div class="choice" id="c2" onclick="answer(false)">❌ 不相等</div>
      </div>
      <div class="fb" id="fb"></div>
    </div>
  </div>
  <div class="screen end-screen" id="es">
    <h1 id="et">🎉 表演结束！</h1>
    <div class="fs" id="fsc">0</div>
    <div class="sd" id="sd"></div>
    <p id="em" style="font-size:16px;margin-bottom:20px;opacity:0.9"></p>
    <p class="sn" id="snn"></p>
    <button class="btn" onclick="startGame()">再来一次 →</button>
  </div>
</div>
<script>
const P=new URLSearchParams(location.search);
const SN=P.get('student')||'';
const T=10;
let rd=0,sc=0,qs=[],ans=false;
const emojis=['🎩','🐰','🎩','🌟','🎪','🎭','🪄','💎','🔮','🧙'];

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function genQ(){
  const r=[];
  for(let i=0;i<T;i++){
    const type=rand(0,3);
    let eq1,eq2,equal,explanation;
    if(type===0){
      // Add trailing zero: 0.5 = 0.50
      const d=rand(1,9);
      eq1='0.'+d;eq2='0.'+d+'0';
      equal=true;
      explanation=`小数末尾添上0，大小不变：${eq1} = ${eq2}`;
    }else if(type===1){
      // Remove trailing zero: 1.20 = 1.2
      const intP=rand(1,9),d=rand(1,9);
      eq1=intP+'.'+d+'0';eq2=intP+'.'+d;
      equal=true;
      explanation=`小数末尾去掉0，大小不变：${eq1} = ${eq2}`;
    }else if(type===2){
      // Not equal: 0.5 ≠ 0.05
      const d=rand(1,9);
      eq1='0.'+d;eq2='0.0'+d;
      equal=false;
      explanation=`${eq1} ≠ ${eq2}，0不能随便去掉！`;
    }else{
      // Not equal: 3.05 ≠ 3.5
      const intP=rand(1,9),d1=rand(1,9),d2=rand(1,9);
      if(d1===d2)d2=(d2%9)+1;
      eq1=intP+'.0'+d1;eq2=intP+'.'+d2;
      equal=false;
      explanation=`${eq1} ≠ ${eq2}，中间的0不能去掉！`;
    }
    r.push({eq1,eq2,equal,explanation});
  }
  return r;
}

function startGame(){
  rd=0;sc=0;qs=genQ();
  show('ss',false);show('es',false);show('gs',true);
  next();
}

function show(id,v){document.getElementById(id).classList.toggle('active',v)}

function next(){
  if(rd>=T){end();return}
  ans=false;
  const q=qs[rd];
  document.getElementById('fb').className='fb';
  document.getElementById('c1').className='choice';
  document.getElementById('c2').className='choice';
  document.getElementById('rn').textContent=rd+1;
  document.getElementById('pb').style.width=(rd/T*100)+'%';
  document.getElementById('mo').textContent=emojis[rd%emojis.length];
  document.getElementById('mo').classList.remove('transform');
  document.getElementById('eq').innerHTML=`<span class="highlight">${q.eq1}</span> <span style="color:#999">?</span> <span class="highlight">${q.eq2}</span>`;
  setTimeout(()=>document.getElementById('mo').classList.add('transform'),100);
}

function answer(userSaysEqual){
  if(ans)return;
  ans=true;
  const q=qs[rd];
  const fb=document.getElementById('fb');
  const isCorrect=(userSaysEqual===q.equal);
  fb.classList.add('show');
  if(isCorrect){
    sc+=10;
    document.getElementById('sv').textContent=sc;
    fb.className='fb show ok';
    fb.textContent='✅ 正确！'+q.explanation;
    document.getElementById('c1').classList.add('disabled');
    document.getElementById('c2').classList.add('disabled');
    document.getElementById(userSaysEqual?'c1':'c2').classList.add('correct');
    createSparkles();
  }else{
    fb.className='fb show no';
    fb.textContent='❌ 错误！'+q.explanation;
    document.getElementById('c1').classList.add('disabled');
    document.getElementById('c2').classList.add('disabled');
    document.getElementById(userSaysEqual?'c1':'c2').classList.add('wrong');
  }
  setTimeout(()=>{rd++;next()},2000);
}

function createSparkles(){
  const stage=document.getElementById('stage');
  for(let i=0;i<10;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.style.left='50%';s.style.top='50%';
    s.style.setProperty('--tx',(Math.random()*80-40)+'px');
    s.style.setProperty('--ty',(Math.random()*80-40)+'px');
    s.style.background=['#FFD700','#FF69B4','#00BFFF','#7FFF00','#FF6347'][i%5];
    stage.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}

function end(){
  show('gs',false);show('es',true);
  document.getElementById('fsc').textContent=sc;
  const s=sc>=90?3:sc>=60?2:sc>=30?1:0;
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="star ${i<s?'filled':''}">★</span>`;
  document.getElementById('sd').innerHTML=h;
  document.getElementById('et').textContent=s>=3?'🏆 魔术大师！':s>=2?'🎉 表现不错！':'💪 继续加油！';
  const m=['继续加油哦！','还不错，再努力一下！','很棒，你真厉害！','太优秀了，满分！'];
  document.getElementById('em').textContent=m[s];
  if(SN)document.getElementById('snn').textContent='玩家：'+SN;
}
</script>
</body>
</html>
