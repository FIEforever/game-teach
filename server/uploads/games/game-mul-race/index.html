<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乘法赛车 - 乘法运算定律应用</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC',sans-serif;background:linear-gradient(135deg,#2c3e50 0%,#3498db 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.gc{width:100%;max-width:480px;padding:16px}
.screen{display:none;text-align:center}
.screen.active{display:block}
.start-screen{color:#fff}
.start-screen h1{font-size:28px;text-shadow:2px 2px 4px rgba(0,0,0,0.3);margin-bottom:8px}
.start-screen p{font-size:15px;opacity:0.9;margin-bottom:20px}
.car-preview{font-size:48px;margin:16px 0;animation:carDrive 1.5s ease-in-out infinite}
@keyframes carDrive{0%,100%{transform:translateX(0)}50%{transform:translateX(20px)}}
.btn{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;padding:14px 40px;border-radius:30px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.3);transition:transform .2s}
.btn:hover{transform:scale(1.05)}
.gh{display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:10px}
.gh span{background:rgba(255,255,255,0.2);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.pb{height:8px;background:rgba(255,255,255,0.2);border-radius:4px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#e74c3c,#f39c12);border-radius:4px;transition:width .5s}
.ga{background:#fff;border-radius:24px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.15);min-height:420px}
.qb{background:linear-gradient(135deg,#FFEBEE,#FFCDD2);border-radius:16px;padding:14px;margin-bottom:14px;font-size:15px;font-weight:700;color:#C62828}
.track{position:relative;height:140px;background:linear-gradient(180deg,#81C784,#66BB6A);border-radius:16px;margin:12px 0;overflow:hidden;border:3px solid #4CAF50}
.road{position:absolute;top:50%;left:0;right:0;height:40px;background:#555;transform:translateY(-50%);border-radius:4px}
.road::after{content:'';position:absolute;top:50%;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg,#FFD54F,#FFD54F 20px,transparent 20px,transparent 40px);transform:translateY(-50%)}
.road-line{position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,0.1) 60px,rgba(255,255,255,0.1) 62px)}
.my-car{position:absolute;top:50%;transform:translateY(-50%);font-size:28px;transition:left 1s ease-in-out;z-index:2}
.ai-car{position:absolute;top:50%;transform:translateY(-50%);font-size:24px;transition:left 1s ease-in-out;z-index:1}
.finish{position:absolute;right:20px;top:10%;bottom:10%;width:4px;background:repeating-linear-gradient(180deg,#000 0px,#000 8px,#fff 8px,#fff 16px);border-radius:2px}
.tree{position:absolute;font-size:16px;opacity:0.7}
.speed-display{display:flex;justify-content:space-around;margin:10px 0;padding:10px;background:#F5F5F5;border-radius:12px}
.speed-item{text-align:center}
.speed-item .label{font-size:11px;color:#999}
.speed-item .value{font-size:20px;font-weight:800}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.opt{padding:12px;border:3px solid #E0E0E0;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;background:#fff}
.opt:hover{border-color:#e74c3c;transform:scale(1.03)}
.opt.correct{border-color:#4CAF50;background:#E8F5E9;animation:pulse .5s}
.opt.wrong{border-color:#f44336;background:#FFEBEE;animation:shake .5s}
.opt.disabled{pointer-events:none;opacity:0.5}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fb{text-align:center;padding:10px;border-radius:12px;margin-top:10px;font-size:14px;font-weight:600;display:none}
.fb.show{display:block;animation:fadeIn .3s}
.fb.ok{background:#E8F5E9;color:#2E7D32}
.fb.no{background:#FFEBEE;color:#C62828}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.end-screen{color:#fff}
.end-screen h1{font-size:28px;margin-bottom:16px}
.fs{font-size:64px;font-weight:800;margin:16px 0;color:#e74c3c}
.sd{font-size:48px;margin:16px 0}
.star{display:inline-block;color:#555;transition:all .5s}
.star.filled{color:#FFD700;animation:starPop .5s}
@keyframes starPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sn{font-size:14px;opacity:0.7;margin-top:8px}
</style>
</head>
<body>
<div class="gc">
  <div class="screen start-screen active" id="ss">
    <h1>🏎️ 乘法赛车</h1>
    <p>乘法运算定律应用 · 四年级</p>
    <div class="car-preview">🏎️🏁</div>
    <p style="font-size:13px;opacity:0.8;margin-bottom:20px">答对题目让赛车加速<br>运用运算定律赢取比赛！共10关</p>
    <button class="btn" onclick="startGame()">开始比赛 →</button>
  </div>
  <div class="screen" id="gs">
    <div class="gh">
      <span>第 <span id="rn">1</span>/10 关</span>
      <span>⭐ <span id="sv">0</span>分</span>
    </div>
    <div class="pb"><div class="pf" id="pb" style="width:0%"></div></div>
    <div class="ga">
      <div class="qb" id="qb">用最简便的方法计算！</div>
      <div class="track" id="track">
        <div class="road"><div class="road-line"></div></div>
        <div class="finish"></div>
        <div class="tree" style="top:5%;left:20%">🌳</div>
        <div class="tree" style="bottom:5%;left:50%">🌲</div>
        <div class="tree" style="top:8%;left:75%">🌿</div>
        <div class="my-car" id="myCar" style="left:5%">🏎️</div>
        <div class="ai-car" id="aiCar" style="left:5%">🚗</div>
      </div>
      <div class="speed-display">
        <div class="speed-item"><div class="label">你的速度</div><div class="value" id="mySpeed" style="color:#e74c3c">0</div></div>
        <div class="speed-item"><div class="label">对手速度</div><div class="value" id="aiSpeed" style="color:#3498db">0</div></div>
      </div>
      <div class="options" id="opts"></div>
      <div class="fb" id="fb"></div>
    </div>
  </div>
  <div class="screen end-screen" id="es">
    <h1 id="et">🏁 比赛结束！</h1>
    <div class="fs" id="fsc">0</div>
    <div class="sd" id="sd"></div>
    <p id="em" style="font-size:16px;margin-bottom:20px;opacity:0.9"></p>
    <p class="sn" id="snn"></p>
    <button class="btn" onclick="startGame()">再来一次 →</button>
  </div>
</div>
<script>
const P=new URLSearchParams(location.search);
const SN=P.get('student')||'';
const T=10;
let rd=0,sc=0,qs=[],ans=false,myPos=5,aiPos=5;

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function genQ(){
  const r=[];
  for(let i=0;i<T;i++){
    const type=rand(0,3);
    let question,correct,wrongs,explanation;
    if(type===0){
      const a=rand(4,12),b=rand(4,12);
      const r1=a*b,r2=b*a;
      correct=`${a}×${b} = ${b}×${a} = ${r1}（交换律）`;
      wrongs=[`${a}×${b} = ${r1+1}`,`${a}×${b} = ${r1-1}`,`${a}+${b} = ${a+b}（加法了）`];
      question=`用交换律计算 ${a} × ${b}`;
    }else if(type===1){
      const a=rand(2,6),b=rand(2,6),c=rand(2,6);
      const r1=a*b*c;
      correct=`(${a}×${b})×${c} = ${a}×(${b}×${c}) = ${r1}（结合律）`;
      wrongs=[`(${a}×${b})×${c} = ${r1+1}`,`${a}×${b}+${c} = ${a*b+c}`,`${a}+${b}×${c} = ${a+b*c}`];
      question=`用结合律计算 ${a} × ${b} × ${c}`;
    }else if(type===2){
      const a=rand(2,9),b=rand(10,30),c=rand(10,30);
      const r1=a*(b+c);
      correct=`${a}×(${b}+${c}) = ${a}×${b}+${a}×${c} = ${r1}（分配律）`;
      wrongs=[`${a}×(${b}+${c}) = ${r1+1}`,`${a}×${b}+${c} = ${a*b+c}`,`${a}+${b}×${c} = ${a+b*c}`];
      question=`用分配律计算 ${a} × (${b} + ${c})`;
    }else{
      const a=rand(25,50),b=rand(2,4);
      const r1=a*b;
      correct=`${a}×${b} = ${a}×${b} = ${r1}`;
      const wrongOff=[rand(1,5),rand(1,5),rand(1,5)];
      wrongs=[`${a}×${b} = ${r1+wrongOff[0]}`,`${a}×${b} = ${r1-wrongOff[1]}`,`${a}×${b} = ${r1+wrongOff[2]}`];
      question=`快速计算 ${a} × ${b}`;
    }
    r.push({question,correct,wrongs,explanation:correct});
  }
  return r;
}

function startGame(){
  rd=0;sc=0;qs=genQ();myPos=5;aiPos=5;
  show('ss',false);show('es',false);show('gs',true);
  next();
}

function show(id,v){document.getElementById(id).classList.toggle('active',v)}

function next(){
  if(rd>=T){end();return}
  ans=false;
  const q=qs[rd];
  document.getElementById('fb').className='fb';
  document.getElementById('qb').textContent=q.question;
  document.getElementById('rn').textContent=rd+1;
  document.getElementById('pb').style.width=(rd/T*100)+'%';
  document.getElementById('myCar').style.left=myPos+'%';
  document.getElementById('aiCar').style.left=aiPos+'%';
  document.getElementById('mySpeed').textContent=Math.round(myPos);
  document.getElementById('aiSpeed').textContent=Math.round(aiPos);
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.options=[q.correct,...q.wrongs].sort(()=>Math.random()-0.5);
  q.options.forEach(o=>{
    const d=document.createElement('div');
    d.className='opt';
    d.textContent=o;
    d.onclick=()=>pick(o,d);
    opts.appendChild(d);
  });
}

function pick(val,el){
  if(ans)return;
  ans=true;
  const q=qs[rd];
  const fb=document.getElementById('fb');
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
  if(val===q.correct){
    sc+=10;
    document.getElementById('sv').textContent=sc;
    el.classList.add('correct');
    fb.className='fb show ok';
    fb.textContent='✅ 加速！答对了！';
    myPos=Math.min(85,myPos+8);
    aiPos=Math.min(85,aiPos+rand(2,5));
  }else{
    el.classList.add('wrong');
    fb.className='fb show no';
    fb.textContent='❌ 正确答案：'+q.correct;
    aiPos=Math.min(85,aiPos+rand(5,8));
  }
  document.getElementById('myCar').style.left=myPos+'%';
  document.getElementById('aiCar').style.left=aiPos+'%';
  document.getElementById('mySpeed').textContent=Math.round(myPos);
  document.getElementById('aiSpeed').textContent=Math.round(aiPos);
  setTimeout(()=>{rd++;next()},2000);
}

function end(){
  show('gs',false);show('es',true);
  document.getElementById('fsc').textContent=sc;
  const s=sc>=90?3:sc>=60?2:sc>=30?1:0;
  let h='';
  for(let i=0;i<3;i++)h+=`<span class="star ${i<s?'filled':''}">★</span>`;
  document.getElementById('sd').innerHTML=h;
  document.getElementById('et').textContent=myPos>aiPos?'🏆 你赢了比赛！':s>=2?'🎉 比赛结束！':'💪 继续加油！';
  const m=['继续加油哦！','还不错，再努力一下！','很棒，你真厉害！','太优秀了，满分！'];
  document.getElementById('em').textContent=m[s];
  if(SN)document.getElementById('snn').textContent='玩家：'+SN;
}
</script>
</body>
</html>
